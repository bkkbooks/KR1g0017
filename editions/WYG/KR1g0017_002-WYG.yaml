body:
  text: 五經稽疑卷二明朱睦㮮撰尚書放勲非堯號程正叔曰放勲非堯號葢史稱堯之道也謂三皇而上以神道設教不言而化至堯方見於事功也後人以放勲為堯號故記孟子者遂以堯為放勲也若以堯為放勲則皋陶曰允廸禹曰文命下言敷於四海有甚義㮮初讀堯典頗疑此二字及得正叔論則瑩然自解矣南曰明都堯典曰申命羲叔宅南交平秩南訛傳曰南交南方交趾之地也陳氏曰南交下當有曰明都三字後人傳寫脱爾若以南交為交趾不可解葢交趾逺夷也三代時疆宇未廣况堯時耶陳氏之謂明都亦不敢信明明揚側陋吳幼清曰明明普照精察之意重言二字者猶前言安安也揚舉也側陋偏僻之處四岳既辭堯使舉以自代謂在朝既無其人則明明揚偏僻微賤之人衆與帝言有鰥在下曰虞舜帝曰我亦聞有是人也岳又言舜父頑母嚚弟傲能諧和之是以衆舉也按蔡傳此一句似泛言薦舉賢者吳以側陋指舜為尤切納于大麓納于大麓烈風雷雨弗迷孔叢子引夫子曰此言人事之應乎天也堯既得舜歴試諸難使大録萬幾之政葢是時陰清陽和五星來備風雨各以其應不有迷錯愆伏明舜之行合於天也或以大麓為山麓是堯納舜於荒險之地而以狂風霹靂試之乎此説大誤受終文祖正月上日受終于文祖傳曰文祖者堯始祖未詳所指為何人及考司馬遷謂文祖者堯之太祖也舜攝祚必於文祖之廟而告焉推原其始也七政右旋七政蔡傳謂日月五星隨天而左旋今觀乾象甚為不然何以見之當天氣清爽之時指一宿為主使太陰居是宿之西一丈許盡一夜則太陰過而東矣葢列宿附天舍次而不動者太陰過東則其七政右旋明矣洪武間詔謂如此解又命儒臣推此例得六十六條名曰書傳㑹選云柴望山川唐參五經文字云柴字本作祡下從示經典取燔柴多從木朱子語錄云注家以至于岱宗柴望為句某謂當柴望秩于山川為句如柴望大告武成今案上章有望于山川之語則柴字自為句尤為明妥説文引書亦以柴字為句五玉三帛歲二月廵守東方諸侯以五玉三帛二死一生贄見於君者鄒氏曰舊本五玉即五瑞按周禮典瑞注云瑞符信也五等諸侯執之以合符於天子天子受之而不還也嘗考之瑞者上頒而下守之以為有國者之符信也贄者下獻而上受之以為享上之儀物也二説所用不同鄒氏似得之象以典刑象如天之垂象以示人而典者常也罪之不可宥也或曰罪有大小刑有重輕刑所以倣象其罪而加之耳傳謂如天之垂象以示人非是四罪而天下咸服流共工于幽洲放驩兠于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服流即流宥五刑之流放竄殛亦流也言棄置於此不得他適竄匿之如穴中鼠也殛謂待死於此以終其身流放竄殛四者有重輕如宋之編管羈管安置居住之類而説者不明殛字之義以殛為誅死果若是四罪鯀為最重誤矣難任人傳稱難拒絶也任古文作壬言不用包藏凶惡之人也朱子語録云難平聲任如字言不可輕易任用人也此篇集傳曾經朱子訂定不知今傳何以不同也擊石拊石舜典云夔曰於予擊石拊石百獸率舞益稷之篇又有夔曰於予擊石拊石百獸率舞此條重出不然舜典衍一簡也舜之命二十二人莫不濟濟相譲惟夔則否乃自贊其能夔必不為也吾友蘇國卿曰於漢書作烏是夔嘆美之辭以見虞廷之樂盛也此説亦通陟方乃死陟方乃死按竹書帝王之殁曰陟故書紀舜之殁曰陟然既云陟而又云陟方乃死則語􅃨矣或注者之詞又按史記曰舜南廵守崩於蒼梧之野夫舜年九十三自謂倦勤而薦禹為天子矣至其百有九歲之後精力已衰而安得渉大江重湖而入蠻夷之境哉夫禹既為天子而舜復南廵是二君矣考之孟子曰舜都於蒲坂卒於鳴條蒲坂去鳴條不逺當以孟子説為是孔壁禹謨禹謨一篇出於孔壁深有可疑葢禹與皋陶舜三人自相問對其見於皋陶益稷篇中予思日孜孜帝慎乃在位此即禹所陳矣又安得有大禹謨一篇且如堯典舜典雖先後布置皆有次序皋陶益稷各自陳説而首尾荅問一一相照獨禹謨雜亂無叙其間只如益贊堯一叚舜讓禹一段當名之以典禹征苗一段當名之以誓今皆混而為一名曰謨殊與諸體不類曰若稽古曰若稽古大禹以下增十七字朱子曰吳氏云此書不專為大禹而作當是後世模倣二典為之皋陶篇首九字亦類此今按此篇稽古之下猶贊禹德而後篇便記皋陶之言其體亦不相類吳氏之説恐或然也禹讓皋陶舜倦勤讓天下於禹而禹讓之皋陶而不及益稷何也禹自以功德不及皋陶而讓之其實皋陶之功不及禹使禹功未叙刑將安施若益稷則皆禹之佐葢同功一體之人禹既以不敢當豈可推其功德於佐者耶禹征有苗舜倦於勤命禹居攝則萬幾之政皆禹代理豈可逺渉數千里之外以征蕞爾之苗哉舜既命禹征苗必躬理政事而班師之後又乃誕敷文德初不見其有退老不聽政之意是知禹之征苗必居攝之前也此章雖繫禹受命神宗之後而自此以下至於皋陶益稷篇末必皆禹居攝時事詳其語意自可見矣皋陶矢厥謨皋陶矢厥謨禹成厥功帝舜申之朱子曰此是三篇之叙第一句説皋陶謨第二句説大禹謨第三句説益稷所謂申之即所謂汝亦昌言者也㮮嘗考之此書本是二篇皋陶謨益稷之間語勢亦相連可知矣孔壁中又折為三篇後儒比堯典以意增曰若稽古四字古本原無也吳氏纂言有辨思曰贊贊襄哉傳謂思曰之曰當作日而益稷篇有思日孜孜之語故也然作曰亦是葢皋陶純乎臣道故自云有功則吾豈敢吾所思者亦曰助君以成功耳若云思日孜孜則無意義明庶以功庶乃試字之誤也按春秋傳趙襄引夏書賦納以言明試以功正作試字舜典又載此句益可以為明証矣搏拊琴瑟尚書大傳云帝王升歌清廟以韋為鼓即搏拊也樂書或拊或搏聲有大小之辨書謂之搏拊明堂位謂之拊搏以其或拊或搏莫適先後也韻書又謂拊當作搏樂器名也諸書所載如此而蔡氏以為搏至拊循葢搏拊琴瑟以合詠歌之聲按此説出説文説文或别有解也夾右碣石夾右碣石入于河右碣石即河赴海處在北平郡二十里左碣石在高麗唐書云碣石在漢樂浪郡遂城縣長城起於此山余觀禹貢祇載右碣石而不載左者以其地逺而莫録也海物惟錯海物水族惟字在句中猶言與及暨也錯石可磨礪者也詩云他山之石可以為錯與錫貢磬錯之錯同意三江既入三江既入諸家注極多惟史記正義解説頗明三江者在蘇州東南三十里名三江之口一江西南上七十里至大湖名曰松江古笠澤江也一江東南上七里至蜆湖名曰上江亦曰東江也一江東北下三十餘里名曰下江亦曰婁江東北並入海也雲土夢作乂雲土夢作乂春秋傳曰楚子與鄭伯田于江南之夢又曰渉睢濟江于雲中則雲與夢二土名而云雲土夢者古語如此猶曰𤣥纎縞云耳敷淺原敷淺原地志曰豫章郡歴陵縣南有博易山古文以為敷淺原根盤三十餘里竒峰疊秀四面如畫是其地矣余按王耕野考訂書傳云高平曰原而又名敷淺則平曠之地不為高山可知禹貢導山即所以導水不論山之高大但於水有干渉曾用工者則錄之否則山雖大不錄也匯澤彭蠡東匯澤為彭蠡集説似誤余嘗考之江水濬發最在上流其次則為漢又其次則為彭蠡三水並持而東則江為中江漢為北江彭蠡為南江非判然異𣲖也葢江漢之合茫然一水惟見其為江也不見其為漢也為彭蠡也故云中江北江南江然其勢則相敵也故曰江漢朝宗于海鳥鼠同穴導渭自鳥鼠同穴同穴山名地志云鳥鼠山者同穴之枝山也傳謂鳥鼠雌雄同穴其説怪誕不經不足信也予友高仲修為陜西參政實分守其地求其故親見鳥鼠雌雄並處一穴因謂予曰禹貢所載誠非誕者先儒或未之見也怠棄三正怠棄三正舊説以為子丑寅三正也當夏之時不知王朝三正並頒於諸侯耶抑止頒夏正也而奈何責有扈以怠棄三正且不奉正朔是欲擅變禮樂改易制度何得云怠棄而己㮮嘗考之以天地人為三正此説簡明切當視前説似優予則孥戮汝此句與上文辭意不屬或有脱簡或是下篇湯誓之文重出在此孥奴通孥戮謂囚繫而戮辱之也嘗聞聖王罪人不孥矧兵戈乎兵戎之事戮及子孫必無也予故為辨之日蝕年月仲康即位次年乃季秋月朔辰弗集于房羲和尸厥官若罔聞知王命𦙍侯征之傳引唐志云日蝕在五年以經文肇位二字觀之當從前説經世書亦云次年也兹率厥典兹率厥典奉若天命此二句當從真氏之説葢兹者此也指伐桀之事而言之也湯以為不幸處君臣之變而仲虺以此乃率循其常道以順天命而己葢治則戴之以為君者常道也亂則誅之以救民者亦常道也變而不失其正即所以為常也故湯則駭之以為變而仲虺則視之以為常兼弱攻昧兼弱攻昧取亂侮亡推亡固存傳謂諸侯之弱者兼之昧者攻之亂者取之亡者侮之此五伯之不為謂湯為之乎使湯果為則德何自永萬邦何為而懷哉竊考兼助也攻治也取正也侮訓也推挽也故弱者助之使得自立也昧者治之使得自明也亂者正之使得自理也亡者訓之使得自思也夫弱昧亂亡皆可亡之道也湯推挽其亡而使之存此民之徯蘇載商而邦之所以昌也賁若草木賁若草木兆民允殖諸家説多不同此二句當作一連讀言害民者去而惟悴之容皆有生意賁然如草木之榮茂而可觀矣十有二月惟元祀十有二月乙丑伊尹祠于先王奉嗣王祇見厥祖其辭亦甚明白先儒乃謂三代雖正朔不同然皆以寅月為首此説似誤究經文則未有首寅之辭而改商之建丑也肇修人紀先王肇修人紀以下歴陳湯之行事以見其積德之深也葢肇字以至字相為首尾言始於此而後儒誤以肇字專屬於修人紀遂以為湯始修復非也顧諟明命顧諟天之明命明命是天之眷命猶言畏天之威也大學引此以釋明德是斷章取義如緝熈敬止之類今釋書者豈得反據而指為我之明德乎若以為即明德則於後面受天明命以有九有之師將何以釋之乎謂之明命猶言元命大命耳庸罔念聞王惟庸罔念聞諸家説皆以庸字絶句予欲作一句讀以庸訓用如説命中王庸作書以告是也盤庚遷都商自祖乙都耿圯於河盤庚欲遷於殷而大家世族安土重遷故盤庚從容開喻以利害也吳氏曰説者言某篇為告臣某篇為告民某篇為兼告臣民以余觀之臣民並集之時固不當呼臣與言而使民不與聞又呼民與言而使臣不與聞特以遷都之利反覆開諭事係乎臣者主臣言係乎民者主民言君心初無適莫臣民皆欲其盡曉故今文解為一篇予若觀火予若觀火予亦拙謀或以我視汝情明若觀火非也夫火雖不可嚮邇猶可撲滅故火蔓延則當撲之今乃坐視其延爇是拙謀矣人臣不從上令則當刑以驅之乃今聽其所為成就其過惡是與觀火者何異惡得不謂之拙謀鞠人謀人鞠謀蔡氏不解其義新安王氏曰導其耕桑薄其稅歛使老幼不失其養鞠人之事也聨其比閭合其族黨相友相助謀人之事也既養之又保之安之則斯民之生生得之矣説築傅巖傳以築為居孔傳云傅氏之巖有澗水壊道常使胥靡之徒築之説賢而隠代築以供食孟子亦云傅説舉於版築之間當以為據築為居之説恐未安也舊學甘盤台小子舊學于甘盤既乃遯于荒野後又入宅于河自河徂亳傳謂高宗自叙失學之因按君奭篇歴叙殷之賢相曰在武丁時則有若甘盤嘗為高宗之相矣蘇氏與經世書紀年俱稱高宗元年甘盤為相遯于荒野以下當從蘇氏之説高宗肜日高宗肜日此史臣追叙其事不應逆書廟號因篇首高宗二字而曲為之説耳嘗考祖庚肜祭高宗之廟而祖已諫之故有豐昵之戒辭㫖淺直亦告少主之語耳肜祭高宗而曰高宗肜日者謂高宗之廟肜祭之日也如仲康命𦙍侯而曰𦙍侯命掌六師高宗命傅説而曰惟説命縂百官書中如此者乃史氏立言之法多類此詔王子出廸按論語言微子去之是不仕於王朝而遯去耳左傳言銜璧輿櫬史記言牽羊抱茅必無是事以商王同父之兄而自歸於武王是忘君辱身而先亡其宗國矣微子必不為也武王既平殷之後擇取親賢而立之耳其命曰建爾上公尹兹東夏往敷乃訓詳其詞意豈成王克武庚後而始封哉偽㤗誓伏生二十八篇無㤗誓武帝時偽㤗誓出先儒馬融軰疑之謂其文淺露不類非惟不似古文亦不似伏生之今文也吾又見昔人所引用㤗誓白魚入于王舟有火於王屋流為烏及他云云而不在今本或又有一㤗誓也按湯武俱以征伐而有天下然湯之辭裕武之辭廹湯之數桀也恭武之數紂也傲以此知㤗誓非當時本文也朝歩自周惟一月壬辰旁死魄越翼日癸已王朝歩自周孔疏曰魄者月輪郭無光處朔後明生而魄死朢後明死而魄生大夫不徒行也王何以曰歩黄公紹曰歩輦也謂人荷而行不駕馬也有道曾孫武成一篇多錯簡先儒王氏程氏劉氏俱有定本亦各不同間嘗考劉氏以為王語之末有缺文其説似優于二氏中間如有道曾孫周王發及昭我周王之語皆是史官叙述之辭非武王自誦其德也師渡孟津戊午師渡孟津癸亥陳于商郊俟天休命自河至朝歌四百里許五日而至左右曰何其速也武王曰紂使膠鬲問師期我告以甲子恐失期而膠鬲死於是亟行軍吏又曰請少緩武王不可曰膠鬲賢者也此傳雖不見經而以此解經為合夫王者之師正而不苛不乗人以險不掩人以不備也血流漂杵武成云前徒倒戈攻于後以北血流漂杵孔傳曰血流漂杵甚言之也明曰血流漂杵不近人情今以杵為杵字之誤也㮮按杵乃搗衣之器非軍中所用者及考杵或曰楯或曰櫓漢書曰血流漂櫓即此物體輕或可漂也陰隲下民惟天陰隲下民相恊厥居蔡傳二句俱以天言洪武間詔正其誤葢相恊厥居乃人君之事若如蔡説則相恊厥居皆付之天而君但安安自居奉天勤民之政畧不相與又豈天佑下民作君作師之意哉五行配数洪範初一曰五行傳曰五行不言用無適而非用也其言似太渾五行者五氣之運行也不言用者無所待于人而自然也造化萬類無不本於五行故以五行配数之一獨不言用也皇極九疇九疇者聖人所以治天下之具其序雖有先後而其中葢無所重輕也傳以前四疇為皇極之所以建後四疇為皇極之所以行牽强無味且皇極不過九疇之一耳安得以一總括其九邪五事配五行傳以五事貌言視聽思配水火木金土甚無謂葢九疇中五行只是論切於民生之用而諸家不察事事配合至於五福六極與五行有何干係而又欲牽引傅㑹此漢儒之失後人不悟復祖述之何哉睿作聖予友高子業云字學明六經如指掌夫睿作聖目擊道存之謂睿其字從目聲入心通之謂聖其字從耳故曰聖人時之耳目無偏無陂陂音秘古文作頗唐𤣥宗以此句韻獨不恊因周易㤗卦旡平不陂釋文陂字亦有頗音遂下詔改無頗為無陂今按頗陂二字皆從皮古字通用但須改音不必改字也雨𤾉燠寒風雨𤾉燠寒風或以為雨屬水𤾉屬火燠屬木寒屬金風屬土按五行惟燠本為火而為木風本為木而為土何也大扺五者不必强合只以雨以潤之日以晅之風以振之自燠之長養至寒之成熟一歲之間五者咸備且叙則庶草蕃廡矣若必於事事求配不免滯而難通也星有好風星有好風星有好雨其故何哉二十八宿環遶於日月行道之側而月行必經歴之經于箕則多風歴于畢則多雨有似于好故謂之好豈真有所好哉五福不言貴五福不言貴葢三代之法貴者始富言富則知貴葢禄以馭其富也貧富貴賤離而為四起於後世不能制爵祿之失冊祝三王金縢之篇曰自冊祝三王外餘皆周史之詞如公乃自以為功公歸納冊公將不利於孺子乃為詩以貽王王亦未敢誚公公命我勿敢言天動威以彰周公之德公勤勞王家之語出郊反風之異决非周公所自為今不復可質究矣信哉我之弗辟我之弗辟我無以見我先王舊以為辟讀為避言周公以管蔡流言避居東都也又以為致辟于管叔之辟二説恐皆未安辟君也我若有無君之心我何以見我先王此或是經義方成王幼冲周公身任安危之寄豈可避小嫌而忘大義哉辟居東都周公辟居東都予己辨其誤吳幼清曰居東謂出征而居東也罪人謂叛人武庚得謂捕獲也武庚伏誅而管叔亦死殷亂遂平此周公居東之由實非避居而出也不廸則罔政在厥邦謂人君政事止是導民於吉康所謂制其田里教之樹畜申以孝弟之義之類是也若不能導民何政事之有或謂廸言德而政言刑殊不可曉越若來三月越若古語辭按堯典傳己引此越若為句而此乃異釋何也朱氏語錄載劉議諫云越若發語辭來三月猶言明三月也又漢律歴志引書武成篇云越若來既死魄雖亦偽書然亦可見古人文法句讀皆如此劉説為有證而不當復釋為迤邐來也復子明辟周公拜手稽首曰朕復子明辟孔氏以此篇謂周公攝而歸政之辭古今儒者從之獨王氏以為不然世或未之信焉以余考之周公踐天子位以治天下初無經見獨明堂位云爾明堂位多出漢儒之説葢武王崩周公以冢宰統百官之政此禮之常即云攝者攝其事非攝其位也世見周公之攝不知其非以成王幼而攝故至卜洛猶有歸政之言王氏之辨為有證兹予明農明農周公謂予徃洛邑體恤農人耕獲之事而盡心於民也時皆以周公明農為告歸不知召公欲告歸周公作君奭留之甚為懇切於人則留之於已則退之安有此理即此反觀當以前説為是殷乃引考周公禋於文武不惟祝君又為殷人祝曰願殷人以長壽考下文王伻殷三句亦是為殷民祝祠此説見周公忠君愛民之意較之諸説專以為王而祝者更為濶大或言攸居王曰又曰時予乃或言爾攸居新安王氏曰王曰之上必有脱簡又曰之下必有脱文不可强解今按王氏説是也王曰之下脱簡即是誤在多士篇内既取彼之文補之於此則此王曰宜衍當刪去予周王也爾殷士也洛邑是殷士所居之地此篇叮嚀告教欲殷士永安居於洛所謂言爾攸居也凡民又曰是我周王乃或能言爾所居諄切懇至如此非愛爾之深其能然乎爾殷士在下者不能敬上周王在上者乃能愛下不為必然之辭故曰或君子所其無逸萍鄉柳子言呂東萊解君子所其無逸一篇極好朱子扣之曰伯恭如何解君子所其無逸柳曰呂東萊解所字為居字曰若某則不敢如此説諸友請曰先生將如何説曰恐有脱字則不可知若説不行而必强立一説雖若可觀只恐道理不如此此與王敬作所不可不敬德朱子皆不欲以處所安居之意釋之懼其巧鑿非古人之本意也複語相承多方周公曰王若曰􅃨語相承書無此體也至末章又先曰嗚呼而後王若曰書亦無此體也周公居聖人之變史官豫恐來世傳疑襲誤葢有竊之為口實矣故於周公誥命終篇發此新例二著周公實未稱王所以别嫌明微謹萬世之防也此吕氏之説頗傷于巧安有新例哉不過訛誤或衍文耳召公不悦蘇氏曰舊説或謂召公疑周公陋哉斯言皆序文意義含糊有以啟之也當時召公為保周公為師並相成王召公有請老之志周公作書以留之細閲君奭無有不悦之意諸説揣摩皆序之陋啟也君奭弗弔君奭弗弔天降喪於殷自後世言之殷之喪周之福也而曰弗弔葢聖人以天下為心不幸遇殷亂而任此責豈所樂哉小子同未在位小子周公自謂也周公東征時召公專任國事今周公雖歸而在位然謂召公今日任事當同我昔日未在位之時未可言去也况上文經曰在今予小子旦則此小子又豈可指成王也讀者當詳之汝明朂偶王按六經圖辨云昔吾二人受武王顧命勉輔成王若耕之有偶也古人耕不用牛然牛服車祭祀而已以牛而耕秦以上未之聞也至漢趙過教民牛耕牛耕自趙過始天惟五年天惟五年蔡傳謂五年必有指實而言孔氏牽合歲月者非是葢五者自武王克商之年追數五年之前紂惡已極商己當亡然天以其為商先王子孫故湏待寛假未遽亡之以至五年之久也從容以和從容以和只是凡事無急廹當從容寛緩以和之葢近民之法當如此耳否則强欲速化而民且無所措手足矣傳謂和不可一於和當從容以和之語疑有誤喪服受冊成王崩未葬太保使太史奉冊受王于次王以喪服見受教戒荅拜此蘇説也朱子不取㮮以蘇説乃禮之正朱説乃禮之權若國有危疑亦不容不行權以定名分絶覬覦也二説均不可廢誕受羑若皇天改大邦殷之命惟周文武誕受羑若羑若諸儒或以為出羑里之囚而天命始順或以為羑里逆地而文王順處之或以為天所眷佑或以為厥若之誤其義皆不通按韻書羑善也若順也誕受羑若者䝉上文而言皇天改大邦殷之命惟周文武大受而善順之大受者見其極負荷之重善順者見其有靈承之實也此二句與君奭天降喪于殷厥既墜命我有周既受同意毖殷頑民多士多方皆周公傳王命告商民也豈有告其人而斥以為頑乎至君陳畢公之命非諭商民即斥之為頑何以為過也讀者不察諭民與命官之辭不同而妄謂成康待商民之薄且使周家忠厚之意自此而銷鑠甚矣耄荒度作刑以詰四方古者刑清律簡至周而律益繁穆王哀民之易麗於法也故五刑之疑各以贖論觀其訖富惟貨之戒必非為歛民財而作也刑之可疑則赦其罪而罰之金乃哀矜敬慎之至非謂罪皆可贖而使富者得生貧者獨死也一篇之中察獄情之隠痛鑒天道之神明示戒勸於報應之間咨嗟懇惻諄復詳練罰贖特篇中之一事耳小序專言訓夏贖刑遂使解者肆為譏詆惜哉馬牛其風馬牛其風孔疏云牝牡相誘謂之風因牝牡相逐而至放逸逺去也按蔡傳祇言風馬牛不言其故故引孔疏以足之耳費誓按費誓淮夷徐戎並興伯禽征之吕氏稱伯禽封于魯夷戎妄窺其新造之邦而伯禽應之甚整暇洛誥傳謂征夷在周公東征之時伯禽就國己久多方傳謂在成王滅奄時與吕氏説不同又有謂成王已伐淮夷故魯惟征徐戎諸説所述如此仍當以吕説為是古今文辨朱子曰書凡易讀者皆古文豈有數百年壁中之物不訛損一字者又曰伏生所傳皆難讀如何伏生偏記其所難而所易者全不能記也又曰孔書至東晉方出前此諸儒皆未見可疑之甚五經稽疑卷二
