body:
  text: 五經稽疑卷八明朱睦㮮撰禮記昬定晨省之節昧爽丕顯向晦宴息此天道之晨昬人事之定節方今未之有改也况人之事親乃庸行也而顧欲踰其節乎記謂子婦鷄初鳴適父母舅姑之所强人以所不可能亦非所以安父母舅姑宴息之性此記者過飭之詞非聖人之訓也禮不妄説人不辭費邵淵曰器用之為便而祭器之為貴䙝衣之為便而衮冕之為貴哀欲其速而申之以三年樂欲其不已而不得終日此不妄悦人之謂哉或貴於多而大或貴於高而文庭實滿百之儀四海九州之薦此不辭費之謂舊説謂不費於言辭豈經㫖乎太上貴徳太上貴徳其次務施報太上者致極之稱猶言大備全徳之人也全徳之人自得而已奪之不以為損予之不以為益愛之不自以為仁利之不自以為義其次奪之知損予之知益愛之為仁利之為義故施則必報是以不可無禮也自禮記左氏凡所言太上者皆若此繫乎人不繫時也若夫坐如尸立如齊朱子曰劉原父云此乃大戴禮曽子事父母篇之辭曰孝子惟巧變故父母安之若夫坐如尸立如齊弗訊不言言必齊色此成人之善者也未得為人子之道也此篇蓋彼文而若夫二字失刪去鄭氏不知其然乃謂此二句為丈夫之事誤矣前有車騎三代有車馬無車騎吉行則六馬四馬師行則元戎小戎自晉乗小駟始有騎至革井田去車戰始有騎兵然則此制亦秦法也公儀仲子之䘮檀弓魯之知禮者於仲子之䘮必其禮當免而免及臨其䘮見其所主之非故問而正之亦禮也説者乃謂故為過禮之免以弔而譏之是方欲責人以禮而先自處於非禮矣知禮者固如是乎季武子成寢季武子成寝杜氏之𦵏在西堦下請合𦵏焉許之張子曰自伯禽至於武子多厯年豈容城中有墓此必是殯欲取其柩以歸合𦵏也按張子之説新矣以事或有未當與孔子合𦵏於防同為伋也妻者是為白也母子思曰為伋也妻是為白也母不為伋也妻是不為白也母余考之父在而服出母期父沒而為後不服此理之常也子思有為而為此語當深思詳察自得之不可以道之隆殺為禮之輕重也古不修墓方希古曰取乎古而師之者以其合乎人情當乎理也父母之棺髐然暴於防而不修何有取於古也信如其言安足以為聖其誣孔子甚矣不知其墓孔子少孤不知其墓殯於五父之衢人之見之者皆以為𦵏也其母卒問於郰曼父之母然後得合𦵏於防夫子何人也焉有不知父墓之所必待母殁始訪於郰曼父之母得合𦵏焉此説甚誕甚誣疑漢儒好竒而為之也易簀曾子𢎞毅之器任重致逺豈肯受大夫之簀而自處於不正乎信如易簀之説者是君子之死不可不正而未死之前猶可以自恕也其誣曽子甚矣意記者訛傳而為之詞後儒因得正而斃之言有合於禮遂信其事而不察其誣歟禫得中制孟獻子禫懸而不樂比御而不入夫子曰孟獻子加人一等矣有子蓋既祥而絲屨組纓孔子既祥五日弹琴而不成聲十日而成笙歌㮮按此三節相聨謂獻子過有子不及記者舉孔子於禮以明祥禫之得中也死而不弔者三三者不弔謂死於畏厭溺非不弔也不忍言之也使孔子果死於匡則亦不弔可乎屈原之死於水則亦不弔可乎而先儒謂賤之而不弔此乃固陋執言失意人心所不安也太公封於營丘太公封於營丘比及五世皆反𦵏於周按史記太公佐周有天下封於齊丘東就國固其俗簡其禮通商工之業便魚鹽之利而民人多歸遂為大國鄭康成曰太公受封留為太師死𦵏於周至五世之後乃𦵏齊皇覧曰吕尚塜在臨菑縣南去縣十里據三説互異與經俱不合然太公元聖留輔是矣返𦵏於周余所不觧也㮮按康成所記頗得實若謂留輔又謂反𦵏自相牴牾何也舜葬於蒼梧之野舜葬於蒼梧之野三妃未之從也祔𦵏自周始然舜卒於鳴條時蒼梧在要荒之外事未必然㮮于尚書稽疑已辨之矣堯妻三女亦無所考子夏哭子䘮明方希古曰孔門曽子最少子夏曽子父之執友也名而数之非曽子事也傳者過也曰朋友有過以其長也則不正之與曰非也正之者是也名而数之曽子不若是暴也何以明之曰斯辭倨曽子之言慤而謹顔淵之䘮饋祥肉顔淵之䘮饋祥肉孔子出受之入彈琴而後食之顔子既禫夫子受祥肉彈琴始食非聖人舉動嘗聞子於是日哭則不歌不飲酒食肉况彈琴乎使其哀已忘則何必彈琴負手曵杖吳幼清曰竊詳此文所載事辭皆妄聖人徳容始終如一至死不變今負手曵杖逍遥於門動容周旋中禮者不如是也聖人樂天知命視死生如晝夜豈自為歌辭以悲其死且以哲人為稱又以泰山梁木為比若他人悲聖人之將死而為歌辭則可聖人自為此歌而自比乃若是妄也蓋七十子以後之人撰造為之欲表明聖人之豫知其死將以尊聖人而不知適以卑之也襲裘之弔曽子得聖人之傳其於禮之節文蓋精察力行有素矣豈有弔䘮不以禮必待子游正之而後始知其失耶出祖之多襲裘之過皆不可信也君子不家於䘮子碩欲粥人之母以𦵏母固為不可其於賻布之餘具祭器何不可哉且班兄弟之貧以恤親修祭先之禮以報本均非私利而䘮祭猶相湏而並重者也子栁乃謂君子不家於䘮而矯情以廢禮不已過乎從母之夫舅之妻從母之夫舅之妻二夫人相為服張子曰此是甥自幼居於從母之家或舅之家孤穉恩飬如父母不可無服所以為此服也非是從母之夫與舅之妻相對為服呉氏曰有同居而食之恩則雖理之所無亦可以義起此服也同母異父之昆弟死公叔木有同母異父之昆弟死問於子游子游曰其大功乎狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人則為齊衰子夏固失矣子游亦未為得也按禮繼父同居有子者服齊衰三月不曰自狄儀始禮不可斯須逺於身有其禮無其財君子弗行有其禮無其時君子弗行君子之於禮也不可斯湏逺於身豈以家之貧富通塞為行乎子思賢者其為道粹者矣信斯言也焉在其喻於道君臨臣䘮以巫祝桃茢清江劉氏曰君臨臣䘮以桃茢先非禮也周之末造也君臣之義非虚也寄社稷寄宗廟寄人民焉爾故君有慶臣亦有慶君有戚臣亦有戚臣疾君親問之臣死君親哭之以致忠愛也若生而用死而弃生而厚死而薄生而愛死而惡是忘生背死也施之以人者不變於存亡然後視其亡猶存也則夫桃茢胡為乎用於諸臣之廟哉遣車一乗晏子齊大夫一狐裘三十年可謂儉矣至於親䘮遣車一乗𦵏之君子儉於已則可儉於親則不可也周禮曰國無道君子恥不盈禮焉晏子是也季子臯葬其妻季子臯𦵏其妻犯人之禾申祥以告曰請庚之子臯曰孟氏不以是罪予朋友不以是弃予以吾為邑長於斯也買道而葬後難繼也申祥請償民之禾是也子臯恃為邑長而謂犯民之禾以為無傷非也且𦵏妻道經民禾孟氏何由而知朋友何由而弃决非子臯之言或訛為傳聞乎耳誓㑹盟疑殷人作誓而民始畔周人作㑹而民始疑誓㑹皆出於天子殷衰諸侯專誓周衰諸侯專盟夫誓盟非古也聖人録之者以為後世之戒深矣百祀之木天子崩虞人致百祀之木可以為棺槨者斬之不至者廢其祀刎其人黄東發曰天子棺槨未必待逺取不至諸百祀而廢其饗刎其人亦恐記者言之過木苟不至豈神之罪而廢其祀雖人之罪亦何至於死苟其行此民将不勝擾豈所謂死無害於人者邪齊大饑有餓者蒙􅃑輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予惟不食嗟來之食以至於斯也從而謝焉終不食而死曽子曰微與其嗟也可去其謝也可食廬陵胡氏曰人之急于食禄嗟來不去者多矣視饑者之操有愧哉㮮按論者高矣過矣嗟者閔之之辭來者呼之之辭曽子之言其為聖人之中道也夫季孫之母死季孫之母死哀公弔焉曾子子貢弔焉閽人為君在弗納曽子與子貢入於其廐而修容焉子貢先入曽子後入卿大夫皆辟席公降一等而揖修容更荘餙也黄東發曰始為閽人所拒既修容入不惟閽人避之卿大夫避位而君亦降等此世所無之事且君在内何敢混入大賢言貌自足動人何用修容乎原壤之母死而歌孔子之故人原壤其母死登其木而歌傳以夫子不聞而過之夫故舊無大故則不弃也是也苟有大故天下宜莫甚於母死而歌此而不弃烏乎弃此疑非夫子之言祭器不假大夫祭器不假謂不假於人也凡有禄者造器必先造祭器後造用器不假謂我不假人之燕器以祭先也以為假之於人非也湯沐之邑方伯朝天子皆有湯沐之邑於天子之畿内視元士春秋隠公八年鄭宛來歸祊公羊傳曰祊者何鄭湯沐之邑也天子有事於泰山諸侯從泰山之下諸侯亦皆有湯沐之田許慎曰周初千八百諸侯之國有時來朝或盡京師之地不能容㮮按湯沐之邑視元士地秪五十里諸侯來朝畿内或賜湯沐之邑諸侯有事泰山亦有湯沐之邑二地皆有限制所用廩餼之類五十里所産自足豈有千八百國諸侯各食一邑哉公羊之觧不攻自破矣三日不作樂昬禮不用樂幽隂之義此説非是昬禮豈是幽隂但古人重此大禮嚴肅其事不作樂者思嗣親之謂非幽隂之義也當祭而太廟火當祭而太廟火如之何孔子曰接祭而已矣註觧曰接字為疾速疾之義當見火更有何心行禮故疾速也或解作接續之義見火則不行禮而暫已及救火已又接前禮以行之吕涇野曰暫已解甚明暢亦可以見禮時為大矣釋奠有合凡釋奠者必有合也有國故則否合謂合樂也春釋采合舞秋釋采合聲釋奠則并合之以侑神也余以為侑神不但用樂亦用幣禮運此篇先儒以為子㳺門人所記以其為仲尼問答之詞也然其中多非聖人格言其文又非漢儒所及意子游門人傳其畧而戰國儒生附益其説歟四靈為畜四靈為畜之説非聖人之訓也至衍為魚鮪不淰等語其誕謾不經益甚矣春禘秋嘗郊特牲曰凡飲飬陽氣也凡食飬隂氣也故春禘而秋嘗春禘饗孤子秋嘗食耆老其義一也凡食常無樂此五字衍后王命冡宰鄭注分后王作兩字觧不通書説后王君公后王猶言君王天子之别稱也東萊吕氏曰内則一篇首言后王命冡宰降徳于衆兆民蓋三代之所以教天下者皆以是自秦漢以來論治者異矣不食肉而飱孔子食於季氏不辭不食肉而飱説者謂以季氏之饋失禮故也夫聖人禮義之中正動静食息無非教也若季氏之饋失禮則當辭而弗食矣豈因其失禮而遂食之不以禮耶恐記者之訛傳也周公朝諸侯于明堂之位明堂位䟽云周公攝王位又云天子即周公周公為冡宰時成王年已十四非攝位但統百官之政周公未嘗為天子豈可以天子為周公此記者之妄註吾於尚書稽疑已言其㮣兹再申之朋友哭於寢門之外朋友哭於寢門之外位右南面者以訃自外至故外向為位而哭也哀盡則位徹矣安得有弔賔來而為主以待之乎説者亦鑿矣衣裳在躬而不知其名為罔先王之制侯王章服必繪畫黼黻之文黼文作金斧形近刃白近銎黒取能斷黻文兩已相背義取能辨能辨能斷事克有濟此審名頋義之謂也㒺字當與學而不思則㒺同看婦人肅拜禮疏曰婦人以肅拜為正朱子語録曰有問古者婦人以肅拜為正何為肅拜兩膝齊跪手至地頭不下為肅拜此浚川觧大義亦同此按少儀少異婦人雖君賜亦肅拜而受惟昬䘮則不然頭手俱至地也使人不由其誠張横渠與人言其子日來誦書不熟且教他熟誦以盡其誠與材他解此兩句只作一意説言人之材足以有為但以不由於誠則不盡其材清廟之瑟清廟之瑟朱絃而䟽越一倡而三嘆有遺音者矣大饗之禮尚𤣥酒而俎腥魚太羮不和有遺味者矣清廟之瑟美其徳而忘其音大饗之禮美其敬而忘其味凡樂以音為之節而反忘音焉意不主於音也意不主於音是故朱絃䟽越乃可尚也凡食饗以味為之文而反忘味焉意不主於味也意不主於味𤣥酒太羮乃可尚也主於音則不能遺音不能遺音則雖繁手滛聲有不足矣主於味則不能遺味不能遺味則雖太牢庶饈有不足矣孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼔云乎哉一倡而三嘆注者曰此聲初發一倡之時僅有三人從而和之言和者少也以其極聲音之美故好者少然其中則有不盡之餘音存焉故曰有遺音者矣㮮按經文一倡而三嘆者蓋一倡三嘆美其樂之盛也謂一人倡而三人和者非是䘮服異制父母之䘮無貴賤一也記謂有大夫服士服之不同者意謂古者䘮冠䘮服貴賤異制亦猶吉服之不紊耳注䟽以布之精粗為别非也悽愴霜露君子之心悽愴於霜露之降怵惕於雨露之濡故春禘而秋嘗不䟽不數合諸天道至敬不忘如将見之求神送神皆有樂以感通之此殷周之所同也庸鼔萬舞作於蒸嘗於詩足徴矣記謂春禘為樂以迎來而有樂秋嘗為哀以送徃而無樂殊不可曉孝弟一道孝弟一道也未有至弟而不本於至孝亦未有孝未至而能為至弟也乃謂至孝近於王至弟近於覇豈聖人之格言乎骨有貴賤貴者取貴骨賤者取賤骨貴者不重賤者不虚示均也惠均則令行善為政如此夫貴賤固有等骨於政何禆焉先王之制禮不𤨏𤨏也如是屬辭比事孔子曰屬辭比事春秋教也其失之亂屬辭比事而不亂則深於春秋者也石梁王氏曰孔子之時春秋之筆削未出又曰加我数年卒以學易性與天道不可得聞豈遽以此教人哉所以教者多言詩書禮樂且有愚誣奢賊煩亂之失豈詩書禮樂易與春秋使之然哉此决非夫子之言讀燕居予觀燕居諸語頗疑誤及閱石梁王氏曰文雖有首尾然辭㫖散慢處多未必夫子之言又篇末二句是記者自作結誤也貧而好樂子云貧而好樂富而好禮衆而以寜者天下其幾矣王氏曰貧而好樂添一好字恐非孔子語聖人立言一字不可更多㮮按石梁之説足剖萬古之疑也弛其親過子云君子弛其親之過而敬其美論語曰三年無改於父之道可謂孝矣高宗云三年不言言乃讙此條必有差誤既稱子云又引論語似重複且論語成於夫子之後安得夫子復引證也履無咎言詩衛風氓之篇履當依詩作體謂卜之於龜筮之於蓍其卦兆之體皆無凶咎之辭也或曰鄭箋詩既以體為卦兆之體何故於此曲附履字之訛非祭男女不交爵子云非祭男女不交爵以此防民陽侯猶殺繆侯而竊其夫人陽侯繆侯兩君之謚也鄭云其國未聞非祭不交爵者先儒謂同姓則親獻異姓則使人攝王氏曰陽侯繆侯既同是侯殺字當如字讀鄭説未聞其國何以知陽為弑也不失色於人表記云子曰君子不失足於人不失色於人不失口於人足者足恭也色者令色也口者巧言也此三事先儒所深恥者孰謂為夫子之言注又云足容色容口容益知其非也以怨報怨子曰以徳報徳則民有所勸以怨報怨則民有所懲以余觀斯民也三代之直道而行也若如禮經所言以怨報怨非也論語曰以直報怨斯聖人之意觀此益知其誤父尊而不親父尊而不親母親而不尊亦自為政者言之若曰以父道臨民近於嚴而不慈母道臨民近於慈而不嚴豈有尊親之異若夫子為政寛猛商頌敷政競絿之義尊親也寛猛也其道一也焉有偏施之理事君大言入則望大利事君大言入則望大利小言入則望小利先儒以為非夫子之言吕氏曰利為禄賞人臣事君各効其忠而已言入而遂望其禄賞乃小人之道非所以事君也何以三年何以三年曰加隆焉爾也焉使倍之故再期也由九月以下何也曰焉使弗及也焉使倍之焉使弗及倒字法也若後人則云使倍之焉使弗及也焉左傳云魯故之以今人則云魯之故也此古今文體之殊魯薛鼔之多少春秋傳曰齊晋之君蓋嘗講此中行穆子相之晉侯先穆子曰有酒如淮有肉如坻寡君中此為諸侯師齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興古人以此行燕禮為㑹同之主以其中否以卜興衰其重投壺之禮如此或非古人所用燕禮者也設用之何獨魯薛二國有之又有皷節之多少以待同姓異姓之别也又不可考讀儒行此篇所記儒行語意重複義理未純蓋戰國儒生之高論非聖人之言也雖然其於儒不合義者亦少學者果踐其言亦不愧其為儒矣見於母母拜之見於母母拜之見於兄弟兄弟拜之母之拜子先儒疑焉䟽以為脯自廟中來故拜受然冠不於廟脯何從來也吕氏以為母有從子之義故屈其體以伸斯湏之敬方氏從䟽義皆非也貍首射義諸侯以貍首為節鄭康成所引曽孫侯氏疑即貍首也貍首田之所獲物之至薄者也君子相㑹不以㣲薄廢禮諸侯以燕射㑹其士大夫物薄誠至君臣相與習禮而結歡奉天子而修朝事故諸侯之射以是為節也但射義稱騶虞采蘋采蘩列在二南貍首亦必其儔矣疑原壤所歌即其首章此孔子刪去巳久射義曷得復歌之不然别有詩也射於矍圃孔子射於矍相之圃蓋觀者如堵墻子路出延射而去者半入者半使公㒺之裘揚觶而語去者半處者半又使序點揚觶而語蓋㢙有存者是聖人於鄉人之賢否漫無取舍而臨時設此律令以聼其去留也聖人之意正欲不肖者觀射而興起好善之心何至已甚如此耶此記者附㑹之文殊不足信也祭當上戊附國朝禮八條辛酉七月周敬王問祀戊之期㮮曰上戊蓋丁前一日也敬王曰何據也㮮曰陳氏禮記集說開載甚明敬王取集説考之遂定祭焉後十年復遇上戊先三日午禮官不白齋期亟召問禮官曰中旬戊日乃是已逹知兩藩臬司矣敬王曰誤乃命改呈是日遂宿齋於外卑不廢尊孝烈皇后崩於嵗暮已下詔矣元旦適屆禮官乃白敬王當致祝否敬王命詢之廵撫張公張公曰查舊典我惟從王王難之於是遣典儀詣㮮問㮮曰卑不廢尊敬王曰然慶典遂不輟祠不先後啟聖祠之建考議悉而倫理明無庸辨矣但祭期不定儀注不頒以致郡縣之祭或先或後或並舉者夫先期則齋日不足後期則誠意已散並舉又非不先食之義也予承乏宗學當祭期二三子來議予曰待伐皷戒嚴之後先一獻然後舉文廟之祭以見禮制人情庶不悖矣分别從祀諸賢從祀諸賢唐宋俱封伯爵國初因之所以可考嘉靖間禮臣上議直曰先賢某子一姓或数人以此郡縣設主或置之上或置之下主既無定而神何以依乎予視宗學將書諸賢主予命仍書諸賢字貫於主後庶不安置誤也三加公服或問曰未有生而貴者也士人冠用幞頭公服不亦僣乎予曰成人之始期望之意也載之㑹典不以為過古禮三加彌尊重冠事也况當代之制乎宗生睦􅐕年十四五欲冠延諸生問禮議未定竟罷吾宗學行此禮冠者踰四十人於是宗生雖愚稚亦稍稍知冠矣婚不舉樂婚吾鄉六禮俱行第親迎日宴飲用樂此貴賤之家俱不廢予婚白於家大人大人曰何也予曰經云娶婦之家三日不舉樂思嗣親也大人亟命止之其後数年予家及族人婚樂竟不能止也良可太息中月而禫三代制禮各不同雖不可得而詳知周必不同於殷也禮云三年之䘮二十五月而畢餘一月即屬三年所以不計閏計閏則不足三年矣余先君禫時亦甞考之蓋聞孔子䘮善殷即可知其㣲矣本朝禮用二十七月猶不計閏亦善殷之意也餕餘之物夫不祭妻壬寅嵗予有内子之䘮當祭之日諸生畢至予趣具儀注諸生辭云昔者之遇是祭也夫旁立令子代之予曰非古禮也乃再命再辭予乃自具草始再拜獻畢又再拜諸生曰何據也予曰禮有之餕餘之物夫不祭妻又見婚義婦初入門夫婦相向各再拜以此推之禮不可以義起乎五經稽疑卷八
