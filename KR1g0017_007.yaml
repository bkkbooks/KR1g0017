body:
  text: 五經稽疑卷七明朱睦㮮撰春秋昭公叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曺人于虢虢之㑹猶宋之㑹也謂傳謂不書盟者以盟先楚故沒之又謂晉主㑹而楚主盟也按此盟果先楚春秋正當書之以見義何必沒之乎此蓋㑹而非盟也且盟㑹相去何逺使盟可沒而㑹不可沒乎楚子麇卒章貢李氏曰左氏謂楚公子圍聘于鄭未出境聞王有疾而還入問王疾縊而弑之遂自立為靈王據子夏傳則靈王䖍與令尹圍本是兩人而郟敖之卒實以疾非以弑也自左傳偽撰其事而諸儒附㑹或曰以瘧疾赴也春秋弑君之賊未必肯以弑赴如商臣弑父而代之豈肯以弑父顯告諸侯春秋知其弑則書弑矣何獨於圍而從告乎或曰以申之㑹故為中國諱也商臣弑父使椒聘魯魯人受之春秋曷不為魯人諱而頋為列國諱乎或曰圍弑君而立恐其惡聞更名䖍商臣弑父校之弑其兄子者其惡何如不聞商臣更名豈不畏惡之播聞乎此傳之不可信者也季孫意如叔弓仲孫貜帥師伐莒左氏謂平子伐莒取郠獻俘用人于社及考之經自此訖春秋魯有四卿權歸三家而傳秪書平子若取郠經亦當見用人于社之説魯三家雖恣肆亦未至是也楚子䖍誘蔡侯般殺之于申公羊曰楚子䖍何以名絶曷為絶之為其誘討也夫以夷狄而伐中國其罪自著何待以名為貶乎且邾人嘗用鄫子矣楚人嘗用蔡世子矣此至惡也而春秋未嘗名何獨於此名為貶乎樸鄉吕氏曰楚子名衍公如晉至河乃復左氏曰魯伐莒取鄆莒人愬之晉故辭公夫伐莒一事也公如晉者七至河而復者五豈盡為莒之愬而却邪盖惡公附楚也晉伐鮮虞公羊曰其曰晉狄之也夫鮮虞猾夏晉昭起而伐之孰曰不可非以諸侯而伐諸侯也此蓋以詞之詳畧為輕重與狄秦狄鄭之義一也不然十五年荀吳帥師伐鮮虞何又不狄之乎八月甲戌同盟于平丘公不與盟廬陵李氏曰程子曰楚弃疾立諸侯懼之故同盟公不得與于同盟之罪實為幸也胡氏全本此若榖梁以平丘為善則固宜以不與為譏公矣公羊以為晉疑公與楚故不與公盟而春秋諱公若公自不肯與盟然此説亦通至陳氏説又不然蓋如胡氏則以沙隨不見平丘不與作一例而與黒壤相對為曲直之辭如陳氏則以沙隨之不見公與平丘之不與自相對為曲直之辭竊嘗考之不見公與公不與文意誠若小不同而陳氏説亦精䆒事理胡氏則全無貶魯之文恐亦小偏故叅校二家論之黒壤之曲全在魯故諱而不書沙隨平丘之曲雖在晉然沙隨以僑如之譛魯實無罪而平丘以邾莒之訴魯亦不能無責焉故於曲之中又分曲直也如此則書法兩通矣許世子止弑其君買許悼公疾飲世子止之藥而卒蓋以藥殺之也不然止何以奔晉也奔者懼罪而逃亦猶魯閔公薨而夫人孫邾之類是也按三傳皆謂世子止以不嘗藥而書弑且為之辭皆妄也歐陽子之辨詳矣曺公孫㑹自鄸出奔宋劉敞曰曺無大夫其曰公孫賢之也何以賢之為公孫喜時之後賢之也此義固然但宋乃曺之讐國也㑹可徃奔之乎其視二華向寜何異且喜時季札皆讓國者也以吳之亂豫貶季札于数十年之前以㑹之奔追褒喜時于数十年之後曾謂善善長而惡惡短之義若是乎蔡侯朱出奔楚左氏稱費無極取貨于東國謂蔡人曰楚將立東國蔡人懼出朱按春秋凡書諸侯出入必有起應昭二十年蔡侯廬卒次年朱奔楚其後三年間朱無入卒之文東國無出奔之事則卒楚之東國即奔楚之朱也東朱字相近榖梁本無國字二名必有傳冩之誤有鸜鵒來巢公榖皆謂鸜鵒非中國之禽宜穴而巢諸儒因之謂去穴而巢隂居陽位臣逐君之象也按羅氏爾雅翼鸜鵒江以南皆有但不踰濟生本巢居亦非穴䖏此義在非所有而有不以其巢為異也逐君之兆亦太泥公圍成左氏及杜預皆謂齊侯使公子鉏帥師從公圍成如此齊之義舉也經當書公以齊師圍成如蔡侯以呉子及楚人戰于栢舉之類也經既不書齊公子鉏則公自圍成而已矣呉弑其君僚左氏叙公子光刺吳僚事甚詳按春秋凡卿大夫弑君者未有不書名氏惟閽者盗者不書如左氏云當書曰呉公子光弑其君僚不書者光之事未可知也黑肱以濫來奔黑肱邾大夫濫邾邑當季氏專國黑肱以邑來奔觀黑字上疑闕邾字蓋經文凡諸侯大夫以地歸者未有不係之國如昭五年莒牟夷以牟婁及防兹來奔是也定公元年春王三月晉人執宋仲幾于京師公榖欲發定無正之義乃分春王二字為一節晋人執宋仲幾為一節後儒宗之致使經義反晦况定公即位于六月戊辰此時位尚未定春秋豈豫責其罪耶蓋是年正月無事三月適有晋人執宋仲幾之事故書之其義責晉非責魯二節合㸔自明也呉入郢楚納子朝之叛其患孔棘吳子伯舉之戰可謂有功于王而入郢則過矣雖然春秋入人之國者多矣傳獨以此狄呉者豈以史文之畧耶然此節上文已有吳子及楚人戰于柏舉故下文從畧與晋伐鮮虞義同鄭游速帥師滅許以許男斯歸季氏曰㓕當作入蓋字之誤也按哀元年許從楚圍蔡十三年許男成卒𦵏許元公以此知非滅也從祀先公盗竊寳玉大弓杜氏曰從順也先公閔公僖公也將正二公之位次所祀非一親盡故通言先公蜀人馮山曰昭公至是始得從祀二説先儒多取馮氏愚嘗竊疑昭公𦵏已五年矣周禮𦵏則虞虞則祔廟豈至是而始從祀耶不祔則不𦵏矣及考諸家之説有謂自從祀至寳玉大弓本是一節今注為二節故生此義蓋陽虎乗季氏之衰得從祀于太廟因從祀而竊其寳玉大弓陽虎賤不得登于䇿故以竊寳玉大弓而見也此説較前二説似優春王三月及齊平夏公㑹齊侯于夾谷葉氏曰夾谷之事榖梁家語與左氏畧同此非聖人之事好事者為之也自八年公兩侵齊齊亦以國夏伐我西鄙至是始與我平而為好方陽虎請師以伐我鮑文子諫則齊且不乗陽虎之亂假之以求得志何忽以一彌犂之言遽求刼我而幸於倉卒乎左氏以為孔子以公退曰士兵之榖梁以為孔子厯階而上不盡一等而視歸乎齊侯此乃戰國刺客所為孰謂聖人而為是此與太史書曺沫事相類沫刼齊小白反其侵地學者固知其非實今又縁沫事謂孔子反求汶陽之田可乎季孫斯仲孫何忌帥師堕費高氏曰前此未有堕邑之事堕邑亂之至也傳以是時孔子為司冦行乎季孫堕郈堕費為孔子之功是不然大夫不臣諸侯陪臣不臣大夫上下循習之所致非一日矣苟欲其不叛在正其本而已矣何城池甲兵之足患哉惟叔孫季孫不知出此故書堕郈堕費所以譏也而傳又反歸功孔子不思之甚也公至自圍成此蓋圍成不克而歸耳説者以為孔子徳化未至也夫堕郈堕費之事皆在圍成之前豈徳化乆而反不至邪宜君子之不信也晉趙鞅入于晉陽以叛趙鞅歸于晉公榖皆曰其言歸何以地正國也後之臣子有據邑以叛而以逐君側小人為辭者非二傳啟之乎齊侯宋公㑹于洮左傳謀救范氏也廬陵李氏曰按謝氏云是時宋有公子辰之難洮之㑹著齊不能清宋難也此亦一説蓋時宋衛方多事而宋之患為尤急豈能舍其國而謀救范氏哉謝氏説是哀公楚子陳侯隨侯許男圍蔡定四年蔡侯以吳子及楚人戰于栢舉楚師敗績吳子乗勝遂入郢夫楚之所深怨者呉也蔡其次也乃何舍吳而圍蔡又重以三國之兵蓋志在蠶食小國與滅頓滅胡相類非專釋憾于蔡也即蔡宜得報而栢舉戰者蔡昭亦以復其祖父之讐也春秋不褒而獨褒楚耶不去爵者楚子自將此例甚明而説者徃徃以稱謂之間而妄生意義也晉趙鞅帥師納衛世子蒯聵于戚衛輙據國拒父其罪甚著榖梁謂不受父命受王父命何也自此説出而後世有不父其父者矣按春秋蒯聵稱世子稱納則輙不當有國益明矣季孫斯叔孫州仇帥師城啟陽魯伐邾取漷東沂西之田雖與之盟猶懼其來伐故城啟陽以防之左氏謂備晉也按春秋二百四十年晉未嘗有伐我之師非尊魯也無由而伐也蓋魯必越齊衞而後至晉也齊衞方睦于魯魯何虞而備晋乎盗殺蔡侯申蔡昭公遷于州來州來廹吳國人憂危人心離貳故盗乗其亂而為逆也左氏謂公孫翩弑之也春秋變文書盗以警有國之君按公孫翩同姓大夫也而弑君又大惡也經隱其名又不書君何也此與閽弑呉子盗殺夏區夫之義俱同以賤故不名亳社災左傳以為武王伐紂使諸侯各立亳社以為亡國之戒按周初封建者八百餘國然在在皆建亳社何謂哉謂存其舊社可也先儒欲謂魯社故曲為之説也齊侯陽生卒左氏謂陽生之卒齊人弑之以悦吳考之經文乃正卒也與鄭伯髠頑同臨川呉氏曰當時以呉師在齊而公卒遂以為弑爾公㑹晉侯及吳子于黄池㑹于黄池此晉吳因我以結好也公羊以為兩伯之辭非也是時吳雖强惟得魯爾欲交中國而無由晉雖世伯而至是諸侯少從者亦欲交呉以弭兵革之患故魯一出而二國從之春秋從恒書非以伯許呉也按是㑹呉自南而北且來自数千里之外其慕晉求㑹之意實多也若果抗中國而伯諸侯晉當從吳呉豈肯深入從晉乎西狩獲麟獲麟三傳訓釋不同治左氏者以為春秋感麟而作文止于所起治公榖者以為制作三年文成而麟至按史記敬王三十九年春魯人獲麟孔子作春秋以是知麟出于前經修于後致瑞之説似無足據矣而定哀之時王澤寖㣲列國驕恣可謂亂極矣麟即弗出春秋可不作邪夾漈鄭漁仲有云孔子據魯史修春秋魯史之紀適至獲麟故於獲麟之後不及他事此説頗為得之夫麟也出非其時聖人傷之或然反袂涕洟則近祅妄杜氏辨之詳矣五經稽疑卷七
