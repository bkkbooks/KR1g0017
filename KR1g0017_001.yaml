body:
  text: 五經稽疑卷一明朱睦㮮撰周易元亨利貞易道廣大精微無所不備故注者各以所見如元亨利貞程傳以為四德本義謂當得大通而利在貞固然後可以保終也或謂二説以占言當宗本義以彖言當宗程傳程傳祖文言者也彖傳爻傳彖曰大哉乾元萬物資始此本彖傳之辭今不曰傳而曰彖何也雖磐桓志行正也此本爻傳之辭今不曰傳而曰小象何也其他卦曰彖曰小象皆類此是義不知本於何人始於何時宋大儒俱不言及或别有意義也文言文言下原有一傳字乃孔子發明文王彖辭之意以盡乾坤二卦之藴而王輔嗣去傳字秖曰文言解者有謂文飾其言有謂交錯而言有謂古有是言而孔子文之按陸明德釋文引梁武帝云文言是文王所制武帝之説必有所據但未詳言耳或曰文即文王言即彖辭孔子傳述文王之意而推廣之也首章云元者善之長也與春秋傳惠伯之辭同後人遂疑非孔子之言㮮常考之古無是語穆姜惠伯亦無是語乃左氏用文言傳假託惠伯云云此無可疑者謂説卦非孔子所述是矣見龍在田見龍在田時舍也項平甫舍讀作去聲止也猶傳舍之舍謂龍初出潛時寓於此朱義雖未明訓音義亦與此同黄裳元吉六五黄裳元吉伊川先生曰坤之五尊位也陰者臣道也婦道也臣居尊位羿莽是也猶可言也婦居尊位女媧氏武氏是也非常之變不可言也故有黄裳之戒按此説象外教人之意不可硬配在坤此爻本是美辭故先儒多有辨也知進不知退知進而不知退知存而不知亡知得而不知䘮曹仲禮云喪字下魏王肅本曰其惟愚人乎知進退存亡而不失其正者其惟聖人乎如此讀意似完足履霜堅氷象曰履霜堅氷陰始凝也馴致其道至堅氷也魏志曰初六履霜陰始凝也霜字下無堅氷二字如今本已云堅氷復云馴致似無謂矣此傳寫之誤當以魏志為是陰疑於陽陰疑於陽必戰舊解陽大陰小陰必從陽陰既盛極與陽偕矣是疑於陽也不相從必戰疑荀虞姚蜀才作凝晁云古稱凝是也㮮少讀疑未解其義今觀凝謂陰凝沍也荀虞諸君之説似亦作據磐桓利建侯初九磐桓利居貞利建侯横渠張氏曰磐石猶言柱石磐磐石也桓桓柱也謂利建侯如柱石在下不可以動然志在行正也如爻傳言磐桓不進之貌潜服在下欲往不能何以建侯横渠之說似為有見即鹿无虞即鹿无虞惟入于林中君子幾不如舍鹿虞翻王肅作麓三互艮下畫山之足也山足曰麓虞謂虞人為鄉導以獲禽獸者三无應是无鄉導故入于林中矣在麓平坦無鄉導且無所獲深林幽暗之地雖有矰繳將安所施乎故君子不如舍也小貞大貞屯其膏小貞吉大貞凶解者曰謂處大事雖正亦凶是聖人教人不正也易為君子謀當如是乎小貞者如朱雲折檻之類是也大貞者如龍逢立諫之類是也殺身成仁非大貞乎利用刑人初六發䝉利用刑人用説桎梏以往吝三原王氏曰利用刑人刑即書所謂朴作敎刑學記稱夏楚二物是也責之以警其怠隋使之從教程傳威之以刑者所以説去昬䝉之桎梏也若痛懲有甚於擊䝉似拷訊罪者非䝉發之道也位乎天位彖曰位乎天位以正中也據鄭氏謂上位字誤當作蒞字天與水違行象曰天與水違行訟先儒謂天在上水在下其行相違故訟或謂上下體也非行也違者天西旋水東注有相左之義故取此象訟也師出以律師出以律在師之初故曰師出律貴和否臧不和之謂也按周禮太師執同律以聽軍聲葢古者出師必吹律和則知士卒同心猶後世軍中風角鳥占之類是也利執言六五田有禽利執言旡咎按言字當作之字傳寫之謬以五柔中不為兵端之象舍逆取順九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也失前禽舍逆取順也郭氏曰今本舍逆取順一句誤在失前禽上此小象四句釋爻辭其第一第三句並先舉爻辭後以義結中間一句獨先申義後舉爻辭三百八十三爻並無此例誤亦明矣輿説輻輿説輻輻説文釋文皆作輹與大畜輹同車下縛木也輹指二輿三自謂也三邇四雖不畜而情有所眷三徃趨上二下畜初説輹之象也輿説輹夫妻反目進不能為人所制也以九三無應故也德積載也既雨既處德積載也君子征凶有所疑也疑舊作礙謂畜道已成是陰盛抗陽之時也陰抗陽如小人害君子其徑路必為布置阻礙動則不利君子安得行乎礙且與韻叶聖人身為度而聲為律故爻傳多有韻視履考祥視履考祥舊讀為句以為終始周旋完備是以元吉或曰視履為句與素履夬履讀同漢上朱氏曰吉事有祥祥生於所履視我所履則吉可考而知也君子有終謙亨君子有終按説苑終下有吉字韓詩外傳曰能以此終吉者君子之道今謂亨通而有終則卦又係君子若義未盡也天下隨時彖曰大亨貞旡咎而天下隨時王肅本謂時為之虞翻蜀才俱從本文虞以為時行則行故天下隨時蜀以為相隨而大亨無咎得於時也得時則天下隨之矣故曰隨時之義大矣哉按二氏俱以時字發揮其義似皆有據咸臨貞吉咸臨貞吉雙湖胡氏曰王輔嗣訓咸為感諸儒多因之然臨以二陽方長乃區區感四五二陰與之相臨置三上不問不亦狹乎故不若訓徧與皆見得陽道廣大公溥而且於立卦命爻之義皆得也未順命也咸臨吉旡不利未順命也未順命諸説多出牽强未穏夫既咸臨而吉旡不利矣乃未順命涑水司馬以為二在下體而不當位故小人未肯盡受命安定胡氏曰未字羨文馮厚齋亦稱羨與彖傳之意合當從之乾胏金矢九四噬乾胏得金矢舊説引用周禮獄訟入鈞金束矢然後聽之㮮按此取象之義夫金剛也矢直也斷獄以剛以直為本豈真有金矢哉如周禮貧者豈能辦之訟終不聽耶周禮或别有指也剛柔交錯剛柔交錯天文也文明以止人文也天文上脱剛柔交錯一句余初讀疑有此句未敢以為然及觀朱子語錄亦稱脱也賁其須六二賁其須雲峰胡氏曰二與三皆旡應與故二附三而動如須附頥而動也其説固是但頥與須雖近與象不合六二純陰不能自動必待九三而後動故賁其須須待也待而後動故象云與上動也七日來復七日來復諸儒解云當為七月謂陽氣從五月建午而消至十一月建子始復所歴七辰故云七月按輔嗣云陽氣剥盡至來復時凡七日則是陽氣剥盡之後凡經七日始復然陽氣至建午始消至建戍之月陽氣猶在何得稱七月來復故鄭康成引易緯之説建亥之月純陰用事建子之月陽氣始生隔此純陰一卦卦主六日七分舉其成數而云七日來復也頻復厲六三頻復厲旡咎諸儒皆訓頻復頻不必安于復故危厲復雖不安義終旡咎也按鄭氏晁氏皆云頻與嚬同古文通用嚬蹙之之貌處下體之終雖愈於上六之迷然居地不中是以蹙也蹙而求復未至於迷故雖危旡咎也天下雷行象曰天下雷行物與旡妄按諸卦之象直言兩象即以卦名緒之若雷在地中復今无妄應云天下雷行无妄乃謂物與无妄者欲見物物皆无妄故加物與二字此皆先儒曲為之解終未犁然當於人心也或曰衍文或曰謄寫之誤又曰茂對時育萬物萬字註者妄增經文原非有也曰閑輿衛良馬逐利艱貞曰閑輿衛利有攸往曰閑輿衛曰字朱子作日字以噬嗑九四凖之疑艱貞下有一吉字葢當大畜之時居九三之位惟宜艱貞則吉也閑習也輿指二衛指初閑習既熟則不至顛仆故其占為利有攸往何天之衢何天之衢亨何梁武帝作荷負也王延壽魯靈光殿賦云直荷天衢以元亨程子曰予聞胡先生曰天之衢亨誤加何字朱子曰何天之衢何其通達之甚也讚之也傳義云云諸儒多從之㮮嘗讀俞玉吾集説引晦叔王氏曰何當作行此解不知從何傳之以上四説均于易有禆而晦叔王氏似尤簡明也顛頥拂經二與四皆曰顛頥五與二皆曰拂經其文則同所係之辭吉凶則不同何也葢下三爻主動故凶上三爻主靜故吉不當以文同而一其説也故曰易不可為典要枯楊生稊九二枯楊生稊陸德明曰稊秀也秀如苗未成莖也解者曰稊根也榮於下者也稊按字書本不訓根據易爻初為本或可象根至二爻則非根矣陽之發生榮自末始不自下而榮其説戾矣南沙熊叔仁著周易象㫖其義與陸德明合是矣枯楊生華九五枯楊生華老婦得其士夫按少字誤作士字及觀郭氏定本亦云少字蟲傷類於士字誤亦明矣士字義理无謂過渉滅頂過渉滅頂凶无咎先儒謂陰柔過極以至滅頂何得謂旡咎葢處上者地事值者時如商紂之亂己極不能救藥比干以宗國之重必諫而死者義之所不得已也殺身成仁何咎之有習坎習坎注疏曰按諸卦名於卦上不加以字此坎卦之名特加習者以坎為險難故特加習名又有曰見其重險險中而復有險也㮮讀俞氏古易集説引郭氏曰習坎上脱一坎字此説似於前二説為優坎不盈坎不盈祗既平旡咎祇鄭作坻水渚也詩宛在水中坻説文云小渚坎之象也澤水盈科而後進九五坎中之陽流而不盈適平於坻而已葢陽剛中正而能出險之象故旡咎也履錯然敬之初九履錯然敬之旡咎王輔嗣曰錯然警慎貌後儒多宗之又有為紛錯乖錯無一定之説㮮嘗讀鶴鳴詩云它山之石可以為錯錯乃琢玉之礪石也言處離之初將進未盛之際如履錯然以敬為務可以无咎矣大耋之嗟大耋之嗟凶嗟字下古文及鄭薛本無凶字晁景迂曰无凶字者得象數理或然也有嘉折首王用出征有嘉折首獲匪其醜舊傳以有嘉為句恐不是㮮讀小象多有韻此當曰有嘉折首庶與韻叶也莫之勝説執之用黄牛之革莫之勝説俞氏曰説吐活切即脱字也六二挽留九三如此堅固九三雖剛亦莫之勝豈能脱身而去或曰勝羨文葢因漸九五而誤喪羊于易喪羊于易旡悔象曰喪羊于易位不當也朱子語録曰喪羊于易不若作疆埸之埸漢食貨志疆埸之埸作易晁以道曰易古文疆埸字與象數合九四之剛非六五之柔所能制是以在其畔而亡去與在藩羸角者異矣晉如鼫鼠晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也鼫鼠子夏康成皆作碩碩大也二三四互艮象鼠九陽為大鼠本草指為蝼蛄項本庵以土狗言皆非得其大首九三明夷于南狩得其大首不可疾貞吳幼清曰大謂三之陽與上應上者三之首故曰大首謂能得上六也不可疾貞先儒俱連讀項氏玩辭貞字自為句得之王假有家王假有家勿恤吉舊傳假至也極乎有家之道也説文曰假格古通用格正也葢言王者能正其家家正而無不化矣蘭氏廷瑞曰如人君正身齊家則父子兄弟夫婦各正位乎内外而不紊故不待憂恤而吉矣今觀蘭之説於説文相合似無可疑解利西南解利西南往得衆也唐李鼎祚本也字下有无所往三字荀爽曰陰處尊陽旡所往也程傳曰不云旡所往省文爾敉亂除難一時之事未能成治道也必待難解旡所往然後來復先王之治觀此二説鼎祚之言似亦足據弗損益之弗損益之先儒皆連讀惟晁氏客語弗損絶句葢損處上九物極則反是以弗損也莫益之莫益之偏辭也或擊之自外來也輔嗣曰獨唱莫和是偏辭也虞氏不然葢在上求之無饜彼莫能應以至反有擊之者矣自外來言怨者衆也衆徧也周匝之辭也故虞氏以偏為徧晁本從之朱子語錄云此處亦可疑當以虞晁之説為是居德則忌居德則忌南軒張氏曰居德則忌言不居其德也積而不流之謂居節齋蔡氏曰居德而不施則與象反矣故忌葢祖南軒之説注疏以則字作明字非莧陸夬夬莧陸夬夬中行旡咎按本草莧有赤白紫三種高二三尺枝梗柔脆陸名當陸此二物以其皆柔脆易翦取以為象舊説莧陸即馬齒莧埤雅云莧高大而見故字從見今稱馬齒莧者其苗屈曲高不過二三寸恐非爻之所取義也此五爻為夬之主取象莧陸以柔脆易斷又不曝而合於中道也入于幽谷初六臀困于株木入于幽谷三歲不覿按象曰入于幽谷幽不明也不明字上誤增幽字義亦甚析也利用亨祀九二困於酒食朱紱方來利用亨祀征凶无咎先儒謂其占利以亨祀若征行則非其時故凶而於義為旡咎也或以為既凶又曰旡咎義則不順熊氏曰經文倒二字旡咎當在征凶之上言亨祀則旡咎征則凶矣亦未繘井改邑不改井乃以剛中也訖至亦未繘井未有功也羸其缾是以凶也郭氏曰乃字上疑脱旡喪旡得往來井井兩句凡彖先舉卦名釋訖次舉繇後以義結六十三卦旡如此者足明脱誤矣井谷射鮒井谷射鮒谷窮也即詩進退維谷之谷射注也言井竭而空不能上出濟物僅足注鮒而已不在谷字取義今傳稱澗谷又稱谷下恐非本爻之㫖井収勿幕井収勿幕俞氏謂収為汲収字作去聲讀詩救切是也幕當作羃掩之也井養不窮葢以濟人利物為功而使之羃可乎已日乃孚已日乃孚漢上朱氏曰十干自甲至已然後為庚庚革也自庚至已十日浹矣已日浹日也例以先庚先甲為訓似為近之鼎元吉亨鼎元吉亨鼎器也非特有安重之義葢其致潔以為烹飪之用則又為卦内巽順外文明又六五以柔中之德居尊而下應九二剛中之臣故元亨吉字羨文當依伊川程子作鼎元亨觀彖傳可見出可以守宗廟震驚百里驚逺而懼邇出可以守宗廟社稷以為祭主也程子郭京俱謂脱不喪匕鬯四字或謂出繼世而主祭也又曰出即鬯之誤㮮嘗考之脱不喪匕鬯四字誠是震為長子自是祭主何必曰出而繼世又何必曰鬯而後可以守宗廟社稷也出或衍文漸下有缺漸字下缺一漸字瀘川毛氏曰易未有一義而明兩卦者晉進也漸非進以漸而進爾賢德善俗山上有木漸君子以居賢德善俗郭氏云賢德以止巽為居風俗以止巽為善今本正文脱風字本義亦疑善下有脱字是也鴻漸于磐鴻漸于磐飲食衎衎孟康曰磐水涯之堆二當互坎可稱水涯之堆虞馬謂磐為山石悉誤坎為飲互兊為食夫鴻水鳥也據于石又何飲食乎孟之説是矣歸妹以須歸妹以須反歸以娣傳謂六三失德而旡正應故有欲歸而未得其歸須待也待未有所適也本義曰須女之賤者未竟其説嘗考之天官書須女四星陸氏震云織女三星貴須女賤此取象之意也漢上之説亦然况于人乎彖曰况于人乎况于鬼神乎先儒疑二句羨觀劉向説苑引孔子告子夏曰豐明而動故能大苟大則虛矣日中則昃月盈則食天地盈虚與時消息即繼之以聖人不敢當其盛而况人與鬼神乎或疑羨是矣遇其夷主遇其夷主吉行也郭氏謂行上脱志字理或然矣或又疑吉字為志字之誤石守道曰四雖幽暗而遇夷主是以志行而吉也豐其沛九三豐其沛日中見沬折其右肱旡咎三原王氏曰折其右肱象既以為終不可用也雖不言凶其凶可知如何得旡咎旡咎二字疑衍傳謂旡所歸咎也又謂雖不可用而非咎也皆不可曉得童僕貞旅即次懷其資得童僕貞俞氏曰貞當自為句周禮有所求貞貞亦古之美辭或謂此意象也黄楚望謂象外之象即此類它爻亦有同此重巽申命彖曰重巽以申命朱子發曰内巽者命之始外巽者申前之命也晁氏徐氏本申命之下有命乃行也王弼誤寫入註按郭京何子元俱云弼本注云命乃行未有不巽而命行也今連二句讀之上句似為贅矣渙其羣六四渙其羣元吉渙有丘匪夷所思此爻謂居陰得中上承九五當濟渙之任者也葢言丘聚也能散其小群使不至於滋蔓固為元吉能散其所聚之大者使不致於作亂惟大智者能之則非常人思慮所及也如舊説是聚有丘非渙有丘也渙其血去逖出渙其血去逖出旡咎舊讀逖為惕虞翻曰應在三坎為血去逖出言去而逺出即象傳所謂逺害之意也上在渙之終去坎逺故象如此凡在險中者貴乎出在險外者貴乎逺也月幾朢月幾朢浚儀王氏曰幾朢者在小畜之上以抗陽凶在歸妺之五以應陽吉中孚之四從陽故旡咎也幾郭京作近孟荀一行作既孟云十六日也晁以道曰古文讀近為既詩徃近王舅是也此當作近即幾朢意豚魚吉豚魚吉傳曰豚躁魚𡨕物之難感者也孚信能感豚魚則旡不至矣所以吉也以此觀豚魚似二物矣即為二物能感者皆不過以食飼之而能應也以食飼而應人人能之非誠之謂也豚魚者即江豚也唐人所謂江豚吹浪夜還風是也豚魚之信如此人之信能如豚魚則何往不吉也過其祖遇其妣過其祖遇其妣王輔嗣曰祖始也謂初也妣者居内履中而正者也過初履二故曰過其祖而遇其妣也先儒曰陽之在上者父之象尊於父者祖之象四在三上故為祖二與五俱相應之地同有柔中之德志不從於三四故過四而遇五是過其祖也五陰而尊祖妣之象按三四在上初二在下何以為過五陽位君之象何以為妣此説頗費詞而輔嗣云云似簡而明也東隣殺牛東隣殺牛不如西隣之禴祭實受其福東隣指二二離隣於東也西隣自謂五坎隣於西也離之陰爻屬牛坎之陽爻屬水禴祭以水雖不如牛之盛然九三以陽實居其中其心誠實有以感格乎鬼神而祭則受福也三陽失位雖不當位剛柔接也程傳云未濟男之窮也謂三陽皆失位此義極精載之火珠林成都隠者述之以告程子作傳用其説以此知漢人解經易簡而明亦未可輕議也未濟征凶未濟征凶利渉大川居下坎之上似亦濟矣而又有坎在前葢亦未濟也六三位不當征之且凶况渉大川乎朱子曰利字上當有不字觀象觀變君子所居而安者易之序也所樂而玩者爻之辭也按節齋蔡氏曰序次序也如否㤗剥復之類余每讀為之疑及觀虞翻本序作象辭作變則今本作序作辭誤也觀下文觀象觀變義當自得之天地之数凡天地之數五十有五此所以成變化而行鬼神也竊嘗謂變化即陽爻陰爻之變也鬼神即六爻所示之吉凶也四營而成易十有八變而成卦能使人趨吉避凶以前民用非神物之功耶此專指占而言也易有四象易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也白雲郭氏曰以易有四象以下與前文不相屬又非别章疑其錯簡俞氏欲移於晝夜象也之下未知是否立象成器立成器以為天下利漢紀引易立象成器以為天下利本義云立下疑有闕文葢使人深考而自得之也是故夫象是故夫象聖人有以見天下之賾而擬其形容象其物宜郭京曰是故夫象四字衍文吕東萊説亦同今觀上下文郭吕之説似不誤此屬前章是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也俞氏曰此屬前章取夬下承上取象之意觀前章意未盡且此章寥寥數語不似特為章俞氏之言不為旡見不見利不勸子曰不耻不仁不畏不義不見利不勸郭氏曰按勸字誤當作動字凡悔吝所生生乎動者則是小人見利而動其勸勉之義皆是善道故季康子問使人敬忠以勸是勉令向善之義審其文句義理甚明矣不威不懲不威不懲小懲而大誡此小人之福説苑不威下脱小字不懲下脱大字此先泛論事理而後舉易以明之説苑去古不逺或有所據也輔誤作與子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也旡交而後求則民不與也郭氏曰與字誤當為輔字與字義大失况下文已有不可重也幾必先見幾者動之微吉之先見者也或以吉字下當有凶字言君子見吉之幾即趨見凶之幾即避所以不俟終日而後作言趨避之速也易曰吉凶悔吝生乎動者也動則幾必先見以此知幾之見不獨一吉字也同功異位二與四同功而異位其善不同二多譽四多懼近也或以為譽可以言善而懼亦可以言善乎善字疑是義字之誤出入以度其出入以度外内使知懼本義曰此句未詳疑有脱誤觀注疏解曰出入猶行藏也言行藏各有其度不可違失於時故韓康伯云豐以幽隠致凶明夷以處昧利貞是出入有度也若不應隠而隠不應顯而顯必有凶咎使知畏懼而不敢為也縱横逆順其道甚大百物不廢言其大也懼以終始其要旡咎言其要也要先儒讀作平聲蘇氏曰得其大者縱横逆順旡施不可而天下無廢物矣得其小者懼以終始猶可以旡咎此庶幾平危傾易之指乎知來者逆數往者順知來者逆此二句先儒多為之疑臨川王氏曰天下之事數往者順知來者逆易為知來而作故其數逆數也數往者順葢因下句而並舉之非謂易有數往之順數也因此援彼潤之以風雨風未嘗潤也烜之以日月月未嘗烜也楊用修曰古人之文有因此而援彼者有從此而省彼者如沽酒市脯不食酒非可食也大夫不得造車馬馬不可言造也如此類皆是坤為柄坤為柄俞氏曰柄為枘乾性圜轉而曲坤性執方而直故乾圜坤枘相反也此一句本義不解當以俞氏之説為是巽為雞巽為雞傳義俱不解臨川吳氏曰以入伏之身而出聲於天氣重陽之内與地風同其感者雞也雞之鳴於丑半者重陽之時也蔡虛齋䝉引亦取其説㮮按巽之性陰也巽之體伏也説卦曰兊見而巽伏也又按古歌炊扊扅烹伏雌雌安得鳴乎以易説卦及古歌巽為伏雌之義明矣重陽之説予所不解也震為龍震為龍龍虞翻干寳作駹以第八章有其文此重出也故以虞干之説為然駹色蒼也震之色亦蒼巽為寡髮巽為寡髮寡虞本作宣按周禮頭髮皓落曰宣古今韻㑹又稱髮白黑雜曰宣宣寡字相近虞之説是矣馬為曵其於馬也為曵郭氏雍曰馬字誤當作其於輿也為曵易曰見輿曵又曰曵其輪故輿有曵而馬旡曵也兊為羊兊為羊李鼎祚曰羊已見前此當為羔庶不重出與震為駹之義一也序卦雜卦物生必蒙物生必䝉故受之以䝉䝉者䝉也郭京曰䝉當作昧衆必所比故受之以比比者比也京曰比當作親今以序卦觀之凡卦無有以本字解者郭氏之説亦有理晉晝明夷晉晝明夷誅也誅孫奕作昧明出地上為晝明入地中為昧得反對之義関子明曰䝉昧者厥道求乎明明夷亦昧也昧不明葢傷之也孫氏奕本此大壯則止大壯則止遯則退也熊氏曰大壯剛以動而曰止非其象矣止葢上字之誤大壯之勢陽上而不已遯則陽退諸家之説紛紛多牽㑹無取也豐多寡旅豐多故親寡旅也項氏曰卦名皆在句上旅獨在下者取韻恊也㮮按取恊之説亦通但聖人之意不可知也如謂必恊則旅字升在句上寡字恊坎下之下不亦可乎謙輕豫怠謙輕而豫怠也虞氏以怠作怡曰豫樂祖考故怡項氏曰此上文大畜時也旡妄烖也萃聚而升不來也烖叶西來叶黎與時怡俱是一韻經文多叶故知虞氏之説不謬也五經稽疑卷一
