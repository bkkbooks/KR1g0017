body:
  text: 五經稽疑卷六明朱睦㮮撰春秋宣公遂以夫人婦姜至自齊先儒以敬嬴之罪因夫人至特稱婦姜以顯之夫魯之聲姜敬嬴穆姜俱在故三君之娶皆稱婦姜以别于君母所謂有姑之辭是也然敬嬴之罪豈於稱婦姜二字足以顯之乎夫人氏不氏則文有衍縮爾非義之所在也邾子來朝豐氏曰按邾子之朝宣與滕子之朝桓同皆直書而罪自見或謂滕為仲尼貶其爵而邾子何以不貶乎晉趙盾弑其君夷臯趙氏曰弑君者穿之手而盾之心也盾將弑而假手於穿穿盾族也受盾之賜惟驅是從是亦鷹鸇之用爾彼欲得禽者豈鷹鸇哉捨盾而治穿穿固受惡無辭而盾之姦得免豈春秋討賊之義乎書曰趙盾弑其君夷臯窮惡之首而誅其心也其義甚明左氏引孔子曰趙宣子古之良大夫也為法受惡惜也越境乃免其誣聖人而失良史之意甚矣鄭公子歸生弑其君夷或曰公子宋弑其君而歸罪于歸生者何蓋歸生鄭之命卿秉國之鈞恃功驕恣不獲于君陽為畜老憚殺之言隂實假手于宋以遂其惡此逆臣之首而宋特其從也又嘗考左氏後十年鄭人討幽公之亂斲歸生之棺而逐其族則鄭在當時已以歸生為罪首矣晉趙盾衛孫免侵陳趙盾身負大逆而預國事再見于經者足以見晉無臣子爾公羊謂復見則不為弑君豈不謬哉蓋弑君者其後别有非禮非義之事則見無則不復見矣盾之見者以與衛孫免侵陳耳齊侯伐萊秋取根牟根牟者萊之属邑也齊侯夏伐萊而秋取之特間一時爾故不再書齊也或謂魯取非是楚子伐鄭永嘉黄氏曰楚莊之立加兵于鄭凡四而兩書楚子説凡例者紛然蓋書楚子者君為將也書人者大夫為將也蠻夷猾夏何可褒而以書楚子曲生意義邪陳殺其大夫洩冶先儒謂洩冶直諫於昏亂之朝以取死故春秋書名以貶之按經之本義在於專殺而極於見弑耳夫人臣之義既已委質豈能緘黙苟容以保身逺害為得以無自立辟為戒乎觀比干諫而死孔子稱仁則洩冶之被殺必為春秋所與也如凡例言洩冶書字陳君書名尊卑之義不亦倒乎春秋烏得為正名之書也齊崔氏出奔衛四明豐氏曰三傳作崔氏傳冩之譌葢篆文夭氏相近故殘缺而意補之耳今據石經子夏傳為正僖公二十八年左傳記崔夭㑹戰城濮距此三十二年計夭之齒僅五六十此時宜尚存爾而於此以為崔杼以族奔先儒皆從之然成十七年傳始言齊侯使崔杼為大夫距此二十年經於襄二十五年書崔杼弑君傳於襄二十七年言崔子縊計杼為大夫之時縱使甚早亦必弱冠而後可以與於國政則奔衛之時杼尚襁褓安能有偪髙國之勢而以族奔邪其為崔夭無疑矣陳夏徴舒弑其君平國先儒謂徴舒之弑君不書名氏則不知祸亂何由而生洩冶之言何由而騐按春秋之討賊之法非盗者閽者未有不書名氏不書則幸而免耳徴舒陳大夫也豈盗閽之類可比耶六月宋師伐滕左氏謂滕恃晉而不事宋以致宋伐按職方滕越齊衛而後至晉入春秋來滕未嘗通晉也此蓋恃魯而不事宋晉魯有亥豕之似左氏遂以為恃晉誤矣冬十月楚人殺陳夏徴舒丁亥楚子入陳納公孫寜儀行父于陳先儒稱殺夏徴舒義也取其國惡也此一事也而臧否懸絶若此蓋就人字子字生義恐誤楚之殺徴舒者正以為縣陳納叛之地也若果戡亂吊其民定其國而去孰曰不可今陳已亡而殺徴舒何益也胡氏謂假于討賊以縣陳信矣衛殺其大夫孔逹左氏謂晉以衛之救陳來討孔逹曰苟利社稷請以我説於是自殺衛人以説于晉而告于諸侯如此何以稱國殺也稱國殺君之意也否則孔逹以一身而免衛之魚肉春秋必異其文以示褒也楚子旅卒楚莊或以為五伯之一愚嘗究其説竊有疑焉何則今之學者論文考古折中於孔子而巳矣孔子有曰其事則齊桓晋文其文則史初未嘗言宋襄秦穆楚莊也及觀孟子所稱五伯亦未有明訓今之所傳皆注者之辭爾孔子獨於桓文有取者以首止葵丘之盟踐土于溫之㑹召陵城濮之役皆有功于王室有禆于生民不使中夏遂為夷狄也若宋襄迄無成功而秦穆楚荘皆嘗為中國患聖人何忍長其冦哉故知五伯之説非春秋意也或謂左傳注又有五伯夏曰昆吾商曰大彭豕韋周曰齊桓晉文亦未敢以為是也成公作丘甲杜氏曰此甸所賦今魯使丘出之譏重歛也按一甸之地兼有四丘而使丘出甸賦丘豈能辨之哉亦不能頓取於人如此之暴也丘甲者則是丘出一甲視舊賦僅增三之一耳以丘出故曰作丘甲也春齊侯伐我北鄙夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績齊侯伐魯遂乗勝伐衛衛使孫良夫出師禦之而敗于新築齊之修怨黷兵侵虐小國其罪甚明也傳者以及齊師責衛夫戰不主被伐者而以伐人者為主新築衛地若從傳豈有衛伐齊而復戰于衛地乎是戰也報宣十八年衛世子臧伐齊之役公至自伐鄭君之出入史必書之其不書者史失之也今成公伐鄭歸飲于廟禮也傳以為危之蜀之盟何以不危之乎其説蓋不可考也新宫災三日哭杜氏曰宣公之廟主未入故曰新宫按魯侯國宗廟之建巳乆即宣公祔廟自有昭穆之次安得為宣獨立宫也設為宣宫災三日哭此為得禮亦何用書以新宫乃侈欲之奉所不當哭而哭者也呉伐郯先儒謂四夷雖大皆曰子此春秋之法仲尼之制也按四夷稱子乃成周之舊典也何以知之夫子嘗曰吾從周又曰非天子不議禮不制度生今之世反古之道烖必及其身吳本伯爵今改為子可乎當是時夫子秉周禮以律周人猶恐周人不服矧制度自已出乎故曰四夷稱子皆成周之舊典非仲尼之制也天子使召伯來賜公命何氏以為文公年長故稱天王成公年少當須如父教子未當錫也是以為之張義而言天子賈逵又以畿内稱王諸夏稱天王夷狄稱天子按經皆稱天王獨此稱子必傳冩之誤廬陵亦以前二觧迂謬不可從杞伯來逆叔姬之䘮以歸經書郯伯姬把叔姬來歸左氏俱曰出也按二姬書有詳畧必有當絶不當絶者何也杞叔姬書卒書逆其喪歸郯伯姬不書卒不書䘮歸然二姬之事雖不可考而把則詳而禮郯則不言所終當絶不當絶者亦可知矣左氏俱出之説或不足據齊人來媵清江劉氏曰伯姬雖賢春秋一褒其身已足矣又何為及其媵哉凡春秋所急者禮也所制者欲也以禮制欲則治以欲敗禮則亂而諸侯一娶十二女則是以欲敗禮矣故春秋備書之所以為戒也非賢伯姬以亂禮也公㑹晉侯衛侯于𤨏澤劉氏曰𤨏澤之㑹本以合晉楚之成也今楚不至魯衛是㑹何邪且合晉楚者宋也宋亦不與又何邪凡晉楚為平則應大合諸侯以申成好今三國㑹而已傳之言未足信也仲嬰齊卒仲嬰齊乃歸父之子襄仲之孫傳以為公孫嬰齊也如傳云十七年復書公孫嬰齊卒何也劉炫曰仲遂受賜為仲氏故子孫稱仲氏是也公㑹晉侯衛侯鄭伯曺伯宋世子成齊國佐邾人同盟于戚晉侯執曺伯歸于京師胡忠簡曰曺伯之罪於經無據左氏謂曺伯卒公子負芻殺太子而代之若然則負芻殺未踰年之君與齊商人弑舍罪均矣安得畧而不書邪又云㑹于戚討曺成公果討之安得更與同盟邪宋魚石出奔楚平公初立蕩澤作亂宋魚石奔楚傳謂澤與魚石皆桓之後也以同族懼而出奔按是時五大夫皆桓族何獨一魚石哉觀它日據彭城以叛則魚石黨澤之心可知矣叔孫僑如㑹晉士爕齊無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離此两言㑹者内大夫㑹諸國之大夫往㑹吳于鍾離故其文不容不然爾説者以為尊吳故殊㑹與首止文同按首止書及以㑹非若㑹以㑹之異也吳何人也春秋以比王世子哉此蓋晉率諸侯而㑹呉其義亦甚顯也晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績凡書敗績者皆稱師如戰于鞌齊師敗績戰于泓宋師敗績戰于城濮楚師敗績之類是也蓋敗未有書爵者鄢陵之戰楚再稱子誤也九月辛丑用郊先儒謂用者不宜用也其意似用人以祭矣若果用人以祭左氏素好誇誕豈不張大其事而記之乎如邾文公用鄫子于次睢之社楚師執蔡世子有用之于岡山當時子魚申無宇皆有言矣若成公果用人以祭豈舉魯國之人無一言乎按邾楚皆是執獲仇敵之人快意于山川之社成公之時未聞有執仇讐之事也用字與用田賦用致夫人之義略同魯號稱秉禮之國豈有用人以祭之理蓋傳者求其説而不得遂以為用人其支離亦至是哉齊殺其大夫國佐四明程氏曰左傳齊殺其大夫國佐以榖叛故如國佐果以國叛則是逆賊也當書曰齊人殺國佐與晉人殺欒盈同一辭可也不得言齊殺其大夫矣且叛逆而為立其後使國弱嗣無是理也襄公九月辛酉天王崩邾子來朝冬衞侯使公孫剽來聘晉侯使荀罃來聘廬陵李氏曰三國之朝聘胡氏本泰山孫氏説貶之然榖注及公羊䟽皆同杜氏説蓋如胡氏説此條當與蟲牢同譏但蟲牢明書巳酉已丑相去四十日赴告之及必矣故胡氏得之此則下無日未有以辨乆近且三傳皆無貶文恐杜説亦可取仲孫蔑㑹晉荀罃齊崔杼宋華元衞孫林父曺人邾人滕人薛人小邾人于戚遂城虎牢虎牢諸夏之藩表得之以興失之以亡内外限界在焉邑雖屬鄭險則關乎中國故城虎牢不繫鄭明虎牢非鄭所宜有也按諸傳或謂不繫鄭為中國諱伐䘮也或責鄭僖不能守也及觀春秋大㫖蓋城虎牢為天下計非為鄭一國言也鄭方黨楚若鄭能守是益楚窺竊中國之志可乎六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光已未同盟于雞澤諸傳皆以諸侯而盟王臣抗也獨杜氏謂王新即位使王官伯出與諸侯㑹盟以安王室與葵丘首止之㑹不同葵丘首止齊桓假王人為重故不敢盟與今單子奉命來盟義甚殊不然悼公賢君且不敢盟同列於國中矧與王臣盟乎八月辛亥塟我小君定姒此襄公妾母也公羊本姒作弋不然此既稱定姒不應哀公時復稱定姒當以公本為正姒字誤莒人滅鄫榖梁曰莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也公羊亦云莒稱人者莒公子鄫之外孫蓋欲立其出也先儒多宗其説獨陸氏不然謂定六年鄭㓕許哀元年許復見于經則鄫之㓕而再見亦何足恠若鄫人實取外孫以為國嗣罪自在鄫非莒之過則經文又當如梁亡之類而言鄫亡不得書㓕也且鄫雖小國亦有君臣社稷豈肯居然取異姓為後乎按二傳之意莒人欲立其子鄫不從莒遂㓕之以為附庸至昭四年魯復取之再見于經故生此義非立異姓以為後也季孫宿如衛左氏謂報子叔之聘且辭緩報非貳也按子叔聘在元年豈隣國經七年始來報聘其間徃來聘者亦多但非卿不書鄭伯髠頑如㑹未見諸侯丙戌卒于鄵諸侯不生名此名鄭伯者何以鄭伯如㑹而卒也一事故不得兩舉其名若曰鄭伯如㑹未見諸侯髠頑卒于鄵則髠頑又似一人矣亦非史體所以首志其名也榖梁傳以為弑也弑而書卒是春秋庇其逆賊而不討豈理也哉季孫宿㑹晉侯鄭伯齊人宋人衛人邾人于邢丘晉既失陳故為此㑹謀討不睦而左氏謂聼朝聘之數何邪悼公處同列猶執謙不盟國中豈以朝聘之數而僣命之邪其後㑹吳于柤亦以陳鄭叛之之故同盟于亳城北同盟亳城謀楚也先儒皆以鄭服而盟及考左氏記盟誓之辭秪言十二國而無鄭何也蓋晉三駕之兵皆為鄭出也一以公子貞公孫輙伐宋一以公孫舍之侵宋一以楚子鄭伯伐宋苟以此盟為鄭服而鄭何為又從楚有伐宋之師邪宋公使向戌來聘二月巳亥及向戍盟于劉按劉畿内采地未有宋來聘魯而逺盟于畿内者也蓋下有劉夏之文誤增于劉二字爾陳侯之弟黄出奔楚凡書弟者譏其兄不兄弟不弟耳陳侯果不道黄當力諫今棄之而逃夷狄豈無罪哉傳以黄稱弟得弟道故不貶義恐未當公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨自盟澶淵而齊始平故商任沙随兩㑹齊侯皆與焉則知諸侯之㑹以齊服故爾左氏以為錮欒氏非也考之經文二十三年欒盈復入于晉不言所自左氏疑其自齊故為此言以實之且欒盈之奔未甚于趙鞅之叛不錮趙鞅而再錮欒盈此傳之可疑者晉為伯主豈應兩合十二國之君而制一奔臣此理之必無者也吳子遏伐楚門于巢卒吳子伐巢及門而卒故書門于巢卒若曰吳伐楚過巢門于巢遏卒於義不順也三傳見其文竒遂謂吳子為巢人射死及考春秋惟魯事諱臣子不忍之義也於它國何諱焉此與鄭伯髠頑卒于鄵義同十二月乙未楚子昭卒黄氏曰十二月甲寅至乙未相去四十二日為閏月明矣而不書者以䘮不数閏也禮謂三年之䘮二十五月而畢若䘮以閏数則二年之内巳足二十五月安得謂三年哉此説誠是但所謂不数閏者譬如十二月䘮者不數閏十二月也非謂閏十二月䘮從正月数也如其説是卒之日皆可移矣杜氏以十二月無乙未日誤文六年又書閏月不告月如楚子果于閏月卒則即書閏月何害也杜氏之説或亦足據吳子使札來聘程氏端學曰四夷入聘史有常法諸儒以札讓國致亂春秋去其公子以貶按札讓國在聘魯十三年後孔子安得預去公子為之貶乎春秋即此事論此事之義者也未嘗因此事而論他事之臧否也如楚公子貞公孫舍之侵宋猾夏也公子翬公子慶父弑君逆賊也春秋皆不去公子札不過讓國致亂春秋乃去其公子以示貶何輕重之失宜乎楚子使薳罷來聘傳以志其姓氏為進之如公子午公子貞伐鄭俱書氏族無乃亦進之乎蓋大夫姓氏通于中國則書否則但書人而已甲午宋災宋伯姬卒按伯姬卒適與宋災同日蓋災在前而卒在後也災既有日而伯姬䝉上文故不再舉日而非逮火而死也左氏見伯姬卒于宋災之日乃為之説又謂伯姬賢故卒之以理而言雖女子亦當避之况伯姬時年六十矣其以夫人之尊而火至其側姆亦何事而不在耶夫身者父母之遺體遇火而不避卒喪其身可謂賢乎葬蔡景公前年蔡世子般弑其君固至是始𦵏夫諸侯見弑而不書葬者或因其國亂或不以葬期來告或告而不往㑹也是時蔡屬楚魯方事楚因徃㑹𦵏而史書之以此知公羊傳謂賊不討不葬者誤也子野卒左綿趙氏曰公薨而子野卒此與莊公薨而子般卒文公薨而子赤卒何異均未成君均不書地均不書𦵏而子般子赤俱以為弑而子野獨以為毁何也于時季氏之專尤非慶父公子遂之比也此必子野賢季氏忌之弑野而立昭以毁言于朝而世不察爾不然不地不葬文與般赤同文同則其義不應異也莒人弑其君宻州左氏以展輿弑君而自立按展輿莒公子也子弑其父與蔡世子般楚世子商人無異春秋為之諱使後世何所取信乎稱人微者㣲者故不登于䇿也五經稽疑卷六
