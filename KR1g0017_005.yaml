body:
  text: 五經稽疑卷五明朱睦㮮撰春秋僖公八月公㑹齊侯宋公鄭伯曹伯邾人于檉楚人伐鄭凌駕中國之意日甚桓公合諸侯于檉以謀之未幾而盟江黄又未幾而舉次陘之師矣若傳謂救鄭也今鄭巳在㑹矣何救之有城楚丘楚丘非衛邑也何以知之春秋凡書外邑必有所繫如城縁陵不言把必曰諸侯城縁陵以見縁陵之為外邑而非魯自城也如城虎牢必繫于諸侯㑹戚之下曰遂城虎牢以見虎牢之為外邑非魯自城也城内邑則不繫以國如城中丘祝丘之類是也及考隠七年凡伯來聘戎伐凡伯于楚丘繫楚丘于來聘之下益知為魯邑明矣左氏載成季之生也公使卜楚丘卜之卜楚丘者魯大夫也以其國邑為氏故曰卜楚丘也衛詩稱作于楚宫作于楚室而未嘗曰楚丘也惟序詩稱衛楚丘此乃漢儒㳂襲三傳之訛烏足為據虞師晉師㓕下陽傳曰春秋主兵者序上蓋惡兵也虞實主兵矣又何逭首惡之誅乎若或以賄故而首罪虞恐非春秋之意觀虞稱師豈特假道而已設令假道而非主兵則當書虞人晉師豈不益見主者之罪乎杞伯姬來朝其子諸侯之子代父而朝且不可矧從母乎公羊謂來朝内辭也與其子俱來朝也按此直書以示譏未見内辭彼誤兼來朝讀之故有與其子俱來朝之説也晉人執虞公公羊子曰虞巳滅矣其言執之何不與滅也曷為不與滅亡國之善辭也此義謂罪晉不罪虞也以經義觀或不然虞滅不知何時此特執之耳若聖人苟不與滅當明書以示戒從而隱之何謂乎禘于太廟用致夫人諸傳皆以夫人為成風也按春秋夫人非成風也此蓋聲姜初至廟見不書姜氏闕文也以經考之子氏文姜哀姜巳祔于廟仲子别有宫而成風雖存何謂而廟見夫人之為姜氏無疑矣觀十一年陽榖之㑹益信晉里克殺其君之子奚齊晉侯卒里克殺奚齊奚齊未立故書曰殺其君之子不得與成君同稱也榖梁子曰其君之子云者國人不子也然卓與奚齊皆驪姬出也又少于奚齊國人乃以為子耶蓋卓立踰年上下之分已明故書君書弑不然里克之殺奚齊為討罪是春秋賞其姦而與之辨豈理也哉公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹榖梁傳曰㑹于鹹兵車之㑹也盟于寗母衣裳之㑹也兵車㑹者四衣裳㑹者十有一按春秋書㑹盟皆一法耳或謂衣裳或謂兵車不知何所據也如傳云二㑹之外其他㑹更何名也諸侯城縁陵十三年春諸侯㑹于鹹左氏曰淮夷病把故且謀王室也及考前後經文未見王室之事至十四年春諸侯城縁陵縁陵杞邑也秪當謂為杞謀不當云王室也季姬及鄫子遇于防使鄫子來朝左氏謂季姬歸寜而公止之故遇鄫子于防而使之朝也先儒多宗其説按春秋内女適他國者必書曰歸于某季姬未先見于春秋而明年始書歸鄫豈得謂已嫁而歸寜哉巳夘晦震夷伯之廟公羊傳曰晦𡨕也又曰朔有事則書晦雖有事不書此説或非經義按晦月之盡日也有事未嘗不書如成十六年甲子晦晉侯及楚子戰于鄢陵是也春王正月戊申朔隕石于宋五是月六鷁退飛過宋都杜氏曰是月隕石之月重言月者嫌同日也按春秋無此義例事在一日何嫌于同必是文誤上書戊申朔此承上文當云日不當云月也春齊人徐人伐英氏夏滅項英項皆楚與國齊桓伐英㓕項以報婁林之役承上文故不再舉齊也與四年秋江人黄人伐陳義同如左氏云淮之㑹公有諸侯之事未歸而季氏取項故書滅雖罪季氏然非魯史為國諱之義也宋公曹伯衛人邾人伐齊桓公沒羣公子争立宋襄乗齊亂欲以圖伯帥三國之兵伐齊傳者不究其故謂伐齊納孝公也按經義或未然若納孝公則當書曰宋以曺伯衛人邾人伐齊納公子昭如莊九年魯納子紏之法也或書曰宋公曺伯衛人邾人伐齊師救齊齊昭入于齊如莊六年魯齊陳蔡伐衛王人救衛衛朔入于衛之法也今四國伐齊不見納孝公事蹟秪當議其幸桓之死而伐其䘮也不然孝公既納五月何以有甗之戰郜子來朝隠十年公敗宋師取郜取防桓二年又取郜大鼎于宋納于太廟郜之鼎邑俱歸于魯魯或别封之以為附庸也以國未滅故書來朝與常文同公羊子謂失地之君不名者兄弟之辭皆臆度也公伐邾取須句廬陵李氏曰取須句之事若以昭十九年宋公伐邾之例觀之則胡氏之説殊相反春秋不應罪魯如此左氏事不經見恐諸家信之太過須句子既來奔魯史何得不書滅耶若如杜説則鄫亦魯私屬何為復書滅耶故劉氏權衡以為無此年滅須句及來奔事亦無反其君事直是須句乆為邾滅其國為邑魯人徃伐取也狄伐鄭鄭在畿内王所倚毗頽叔桃子將欲叛王故先伐鄭此蓋為叔帶謀也據左氏謂鄭人入滑王使如鄭請滑鄭不聼王怒遂以狄師伐鄭取櫟按入滑事在二十年夏五月王曷不於本年伐之而至是始出狄師耶蓋左氏見王出居欲文致其罪乃取楚史偽撰以實之若然經當明書天王使狄伐鄭以示其貶如取櫟經亦當書豈止曰狄伐鄭哉伐鄭果出王意是年冬王出居于鄭夫伐鄭而依鄭無是理也楚人滅夔以夔子歸傳謂夔不祀祝融與鬻熊楚滅之非其罪故特存其爵而不名也按諸侯失國必名如呉滅胡子髠沈子盈之類是也今不名者夔子小國姓名又未通于中國故不名若非其罪則書滅意已見之矣衛侯燬滅邢公羊謂衛侯燬何以名滅同姓也夫諸侯滅同姓名此出記禮者之妄按晉滅虢楚滅夔皆同姓而未嘗名也苟惡衛侯而絶則晉楚皆不可惡乎朱子曰經文只隔夏四月癸酉一句便書衛侯燬卒恐是因而傳冩之誤晉侯侵曺晉侯伐衛初楚師圍宋宋使告急晉文欲伐楚以楚勢方盛豈能遽加以兵乃侵曺伐衛欲先剪其手足而破其黨與也故齊桓伐楚有事于蔡晉文伐楚有事于曺衛而左氏於侵蔡則曰為蔡姬蕩舟故於侵曺伐衛則曰為觀浴與塊故此其病在推尋事由毛舉細故非惟使二公攘夷安夏之烈闇然不彰而且被其𤨏𤨏之譏也公子買戍衛不卒戍刺之公子買戍衛不卒戍公怒刺之左傳以楚人救衛不克而殺買則與經文相牴牾蓋刺買在前救衛在後公是時懼楚未懼晉也晉侯齊師宋師秦師及楚人戰于城濮楚師敗績城濮之役説者謂楚雖請戰而及在晉侯誅其意也夫及者以尊臨卑之辭非貶也入春秋以來諸侯相侵伐者多矣然皆為私計未有如城濮之戰尊王室安中國正夷夏之分雪㑹盂之恥使楚人不敢内侵者十有五年晉文之功偉矣誅意之説不亦矯枉過正乎公㑹晉侯齊侯宋公蔡侯鄭伯衛侯莒子盟于踐土公榖諸儒俱謂踐土之㑹天王下勞晉侯及王子虎盟諸侯于王庭削而不書去其實以全名也蓋諸儒以此年有朝于王所之文遂附㑹其説稽之經文二十四年天王出居于鄭至是未歸也踐土鄭地也時王尚居踐土何謂下勞乎及考首止葵丘之㑹王世子宰周公皆與焉春秋不為諱而獨于子虎諱之耶此晉文既獻楚俘合諸侯而謀納王也衛侯鄭自楚復歸于衛晉侯城濮戰勝衛侯懼而奔楚既而自楚復歸于衛或曰衛侯書名罪之也按春秋諸侯非失國不名言自楚則黨夷之罪自著不在書名以見也鄭字衍天王狩于河陽壬申公朝于王所左氏謂河陽之狩晉文再致王孔子避致王之名改之曰狩按春秋是年晉文殺叔帶奉襄王還王城過河陽而講武焉諸侯從之公因朝于王所蓋河陽者還王城所必由之路也謂之致可乎如左氏言皆于經先㑹後朝之義不合也衛侯殺其大夫元咺及公子瑕左傳元喧歸立公子瑕為君故衛侯忌而殺之及考經不著立瑕之文瑕必附咺咺既被戮瑕亦不免如士縠箕鄭父之類是也若瑕果立已踰三年尊卑之分既明安得稱元咺及瑕哉又安改其僣號而為公子哉瑕之罪雖不可考然篡立之事必無也衛侯鄭復歸于衛按經文衛侯歸于衛當在殺元咺之上此或傳冩之誤不然衛侯未歸叔武方攝衛事元咺誰為殺也若謂叔武殺元咺叔武賢者國且讓而大夫豈敢專殺乎此足以證傳冩之誤夏四月四卜郊不從乃免牲猶三望記者曰成王以周公有大勲勞於王室命伯禽世世祀周公以天子禮樂按竹書紀年平王四十二年魯惠公使宰讓請郊廟之禮王使史角如魯諭止之以此知郊之僣自僖公始故魯頌所述皆僖公事其不本於成王明矣孔子曰魯之郊禘非禮也周公其衰矣衰者壞也言壞周公之法也孰謂成王盛時而遽壞周公之法乎蓋周季諸侯不遵法軌豈特魯也呉越徐楚僣而稱王皆可推矣不然入春秋已厯四公幾百年而郊祀之事不一見何也明堂位所載出於漢儒附㑹安得舍聖經而從記者之説乎先儒張元徳趙企明金吉父皆謂魯之郊不自伯禽始亦必有所據也晉人敗狄于箕狄伐鄭圍衛又侵齊頻年騷繹中國晉使郤缺帥師敗狄于箕傳謂書人病晉以衰服即戎耳按春秋凡㑹盟戰伐書人非君也亦非命卿也晉僅而後勝乃貶不幸為狄所敗當何以書也文公晉侯及秦師戰于彭衙秦師敗績秦穆公帥師伐晉戰于彭衙書敗績者罪其自取爾先儒或謂晉及秦晉主乎是役也此蓋疑戰于彭衙而發也按公榖皆謂千里而襲人未有不亡者也是役謂晉出其不虞逆而敗之則可主戰則不可八月辛夘大事于太廟躋僖公廬陵李氏曰祫者象生有合族之義列昭穆齒尊卑諸侯之大祭也其禮太祖東向昭南向穆北向父為昭子為穆孫從王父坐也祭畢則復還其廟公榖皆得之其閔僖父子之説左公榖胡氏皆以僖繼閔而立猶子之繼父故傳以昭穆祖父為喻固無可疑矣范甯不從其説乃以祖為莊親為僖謂文公以僖居莊之上楊士勛辨之巳是但左氏正義曰父子異昭穆兄弟同昭穆閔僖本同為穆但閔當在僖上今升僖於閔故云逆祀二公位次之逆非昭穆亂也若兄弟相代即異昭穆設令兄弟四人皆立為君則祖父之廟即已從毁矣理必不然故杜氏只以為位次之逆不以為昭穆之異胡氏辨世指父之義恐未至晉人宋人陳人鄭人伐秦傳以四國稱人貶也按春秋内大夫帥師則稱名氏外大夫帥師則多稱人如隱五年邾人鄭人伐宋桓十四年宋以齊人蔡人衛人陳人伐鄭皆未有書大夫名氏者襄公結怨殘民其罪自見亦不必以稱人為貶也王子虎卒按左氏注王子虎太宰文公王之卿士也内史叔服王之大夫也公羊注子虎即叔服如其説後十四年星孛之變又引叔服之言何也此分明為二人宋儒不可考亦以為一人蓋前注誤之也雨螽于宋公羊子曰外異不書此何以書為王者之後記異也按春秋書鄰國之災如襄二十年齊大災昭九年陳大災十八年宋衛陳鄭災之類甚多蓋有關則書來告則書非特為王者之後而始書也冬十有一月壬寅夫人風氏薨三傳俱以成風為莊公之妾考之經文十年書秦人來歸僖公成風之襚與隐元年宰咺來歸惠公仲子之賵一也比事而觀蓋為僖公之妾無疑矣王使榮叔歸含且賵此天子厚禮諸侯之妾母其義自明傳謂來歸仲子之賵而宰書名則曰貶之也豈歸仲子之賵而王不書天亦曰貶之也豈歸仲子之賵罪在冢宰而不在天王乎歸成風之含賵咎在天王不在榮叔乎春秋書王本以正名分而夫子乃自貶王而去其天則將以是為正名分可乎晉殺其大夫陽處父公羊曰晉襄公使狐射姑將處父止之襄公告射姑射姑出刺䖏父于朝而走設有之當在襄公時何為在襄公既𦵏之後乎如成十五年宋殺其大夫山華元出奔晉則殺山者亦華元乎按樂正子記靈公幼䖏父謀于趙盾欲易之不克誅焉故稱國君與臣同殺之詞也此説近是閏月不告月猶朝于廟杜氏曰猶者可巳之辭此特一説耳春秋有同辭而異議者如僖三十年免牲猶三望可已而不已也今年閏不告月猶朝于廟幸其不已也幸其不已者愛禮存羊之意也晉先蔑奔秦左綿趙氏曰左傳以趙盾使先蔑逆公子雍于秦秦以兵納之及雍將至盾悔而拒秦師故有令狐之戰而先蔑奔秦且襄公之卒於是期年晉始謀立君妄也且初言先蔑如秦次言蔑将下軍蔑既逆雍于秦則必不在将兵之列既巳將兵敗秦而又奔秦皆理之所無也郕伯來奔左氏曰郕太子朱儒自安於夫鍾國人弗狥十二年春郕伯卒郕人立君太子以夫鍾與郕邽來奔按朱儒未甞為君春秋豈容以郕伯書而不名也郕伯事雖未詳其來奔必為國人所逼不名闕文子叔姬卒子叔姬卒左氏以為已嫁于杞遭出雖絶猶以恩録若然當繫以國如郯伯姬之類是也今不繫以國公羊謂婦人許嫁字而笄之死則以成人之䘮治之此説似近其稱子叔姬者别其非先君子也齊公子商人弑其君舍傳者謂齊舍立未踰年而稱君重商人之罪也按春秋已即位稱君未即位稱子如宣十年四月齊侯元卒冬書齊侯使國佐來聘則是頃公已即位矣成四年三月鄭伯堅卒冬書鄭伯伐宋則是悼公巳即位矣春秋凡書未踰年君者皆類此不謂因重商人之罪而稱君也單伯如齊齊人執單伯齊人執子叔姬叔姬歸齊舍已弑叔姬欲還不得魯告于王王使單伯徃諭商人不聼因并單伯執之凡執人者法皆書人先儒或責齊人不討賊而北面事之葢就人字生義誤矣曹伯來朝曹伯十一年来朝至是又來朝適當五嵗之期左氏遂曰諸侯五年兩相朝以修王命古之制也考之禮則諸侯嵗相問殷相聘世相朝也無五嵗相朝之文五嵗再相朝子太叔之言也非古也四不視朔文公四不視朔先儒謂以疾詐齊其説信然至六月巳視朔矣郪丘之㑹公亦不徃乃使公子遂及齊侯盟何也以此知不視朝實以疾非詐也其後因循朝廟視朔之禮皆廢自此始宋人弑其君杵臼左傳稱君君無道也傳其學者遂以宋昭為無道而見弑也見弑之君無道者莫甚於齊襄楚虔經皆書弑者名氏而議不及其君宋昭非二君比也獨以無道稱而弑者免其討豈春秋撥亂反正之義乎蓋弑者賤故不登于䇿也莒弑其君庶其左氏謂莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮于國僕因國人而弑紀公以其寳玉來奔如此是莒僕以太子弑父也春秋何以書國弑乎僕既與國人同弑則當自立矣又何以奔魯乎此蓋弑者衆故不名也五經稽疑卷五
