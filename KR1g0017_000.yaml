body:
  text: 五經稽疑五經總義類提要臣等謹案五經稽疑八卷明朱睦㮮撰睦㮮字灌甫號西亭周定王橚六世孫襲封鎮國中尉萬厯初舉宗正睦㮮嘗築萬卷堂覃思考索著述甚富所作授經圖已别著録是書取五經疑義參考異同而斷以已意徵引極為該博雖其中如郭京易舉正之類未免誤采偽書春秋邾儀父為邾命卿之類未免太涉臆斷而大致平允詞簡而明亦説經家當考之書也惟禮記之末附以明代典禮八條則殊乖説經之體云乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀五經稽疑序屈平者楚之同姓也仕於懷王為三閭大夫屈平職掌三姓敘其譜屬率其賢良以勵國人言行職修王甚珍之為同列上官靳尚所譛王乃疏平平含忠履潔而遽見放逰於江潭行吟澤畔鬱伊易感作離騷以此知古之三百篇皆非無感而作也余少靡所好逰心六經嘗作春秋稽疑餘未及為也癸未四月余病在告杜門謝客頗多餘暇因思古人實有慨於余心乃取四經時披閲焉或有疑者參訂諸家之説而折𠂻之且述且作得若干卷雖不敢比迹昔賢然鬱伊之感庶幾同焉萬厯十一年十月既望周府宗正奉旨督理宗學汴上睦㮮題
