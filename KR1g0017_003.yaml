body:
  text: 五經稽疑卷三明朱睦㮮撰毛詩關雎關雎序言后妃之德也歐陽永叔曰詩人見雎鳩雌雄於河洲之上聽其聲則關關然和諧視其居則常有别有似淑女匹其君子不淫其色亦常有别而不黷也淑女謂太姒君子謂文王也參差荇菜左右流之者言后妃采彼荇菜以供祭祀以其有不妬忌之行左右樂助其事故曰左右流之也流釋文曰求后妃與左右之人常勤其職至日夜寢起不忘其事故曰寤寐求之輾轉反側之類是也后妃進不淫色以專君退與左右勤其職事能如此則宜其有琴瑟鐘鼓以友樂之而不厭也卷耳卷耳序言后妃之志也又當輔佐君子有求賢審官之志此義殊不可曉后妃但職內教善不出閨壼之中業不過籩豆之事何得知天下之賢而進之乎若后妃果能進賢與治是開後世母后專政之門豈足為正風乎考之大任太姒亦則治內事耳此序之誤可知矣樛木樛木興后妃能逮下也其首章曰樂只君子福履綏之君子指文王也詩人以樛木起興以誦文王之德或曰謂后妃也按三百篇未有以君子稱后妃者仍以誦文王為是然后妃之德非文王無以見誦文王即所以誦后妃也兔罝兔罝序曰后妃之化也夫兔罝乃田間野夫所為皆賤者之事即它日為公侯之干城腹心亦非后妃德之所致此當云文王之化行則無不好德賢人衆多也大抵二南之詩多歸之后妃此序之失也芣苡芣苡韓詩曰傷夫有惡疾也詩云采采芣苡薄言采之薛君章句曰芣苡臭惡之菜詩人傷君子有惡疾乃作是詩芣苡雖臭惡我猶采采而不已以比君子言雖有惡疾我猶守而不離去也列女傳載宋女既嫁于夫夫有惡疾其母將改嫁女不從即此詩之意也魴魚頳尾魴魚頳尾王室如燬薛君章句曰魴魚勞則尾赤君子勞則顔色變以王室政教如烈火矣然觸冒而仕者以父母迫近饑寒之憂故也列女傳曰汝濆周大夫之妻所作也與薛傳意同汝濆汝濆序曰文王化行也君子從役於外其妻為樵薪之事遵汝水之濆未見君子惄如調饑調韓詩作朝薛君章句云朝饑最難忍易林云㑂如旦饑覩二說其義晰矣毛詩作調鄭氏求其說不得乃曰調音稠又改字作輖調饑也稠饑也輖饑也三者均之不通也愈解而愈離真不若朝饑之為長也麟趾麟趾序言關雎之應也關雎之化行則天下無犯非禮之事有瑞麟出而為應不惟怪妄不經且與詩意不合關雎麟趾作非一人作麟趾者了無及關雎之意直考詩文自可見其意周南風人美文王之德化及宗族同姓之親皆有信厚之行如麟之有足有額有角以輔衛其身爾其義止此與關雎自無干涉也何彼穠矣何彼穠矣美王姬也采詩之官得之召南之地以王姬下嫁諸侯能執婦道成其雍肅之德其二章曰平王之孫齊侯之子平王去二南甚逺與召公非一時人詩曷得為一編乎此必有誤當闕其疑可也騶虞騶虞被文王之化也召南國君出而田獵虞人翼五豝以待公之發矢也發則必中然止於一發仁心之至不忍盡殺故也田獵則騶虞虞人咸在而草木禽獸之盛如此作詩者呼騶虞之官而嗟嘆之以為文王之化至矣此詩之本㫖毛氏以騶虞為義獸白虎黑文不食生物山陰陸氏及後儒多和之今不敢録柏舟柏舟言仁而不遇也劉向以為衛宣夫人之詩也孔叢子載孔子讀柏舟見匹夫執志之不可易而非婦人之作也今觀詩謂舟浮於水而無人維楫遇風則覆矣以喻衛國無人維持則聽其自為敗壞耳此仁人所以憂國之將敗而警警然不寐如有隱痛之憂亦似婦人不得於夫實非婦人之作也簡兮簡兮刺不用賢也衛之賢者隱於下位世掌樂官其首章云日之方中在前上處公庭萬舞言在日中至明之時在前易察之地而衛君終不知其賢况在側微者乎萬舞者二舞之總名也二子乘舟二子乘舟思伋壽也朱子曰太史公之言有所抑揚謂二子皆惡傷父志終於死亡其情則可取於理為未當又曰伋當逃避使宣公無殺子之事不陷於惡乃為得禮如不忍去而死之尚可也壽無救於兄而重父之過其死也亦何為乎但國人憐而哀之故聖人録國人之情著宣公之過亦以見二子事親之道有未盡也㮮按此詩不瑕有害瑕過也我思二子之事於行無過有何不可而不去正與朱子言詩之意合也木瓜木瓜美齊桓公也衛國為狄所滅出處於漕齊桓救而封之遺以車馬器服而衛人感之言我為狄所滅之時但有遺我以微物猶當報以瓊瑶况齊桓贈遺之厚如此則當何以為報此感其救患之恩謂為瓜瓊不等之喻非尋常施報者之意也㮮少小聞大父豫齊府君向余曰昔高祖憲園與鄭長史論詩及此曰爾以木瓜為今之所食者邪鄭君曰然憲園曰以桃李為木桃木李邪詩人取意以贈雖輕而報之不可不重也君子陽陽君子陽陽閔周也賢者遭亂知道之不行欲求全身逺害所以辭尊居卑辭富居貧豈惡富貴而不居哉誠以位尊則責重祿厚則憂深非吾力之不堪而遭值之不辰也賢者逺害居卑則國事日去故詩人不閔君子而閔周也丘中有麻丘中有麻思賢也莊王不明賢人放逐故國人思之而作是詩也留大夫嗟字也大夫隱居丘陵之間而殖麻以為生者也此篇與白駒之意一也夫賢者見逐國人欲致愛慕相與遊從而知莊王之不能復用可慨也已將仲子將仲子莆田鄭氏曰此淫奔詩也㮮玩其詞亦有可疑其首章無踰我里無折我樹杞豈敢愛之畏我父母二章曰無踰我墻無折我樹桑豈敢愛之畏我諸兄此與召南無感我帨詩一意且人情能知畏憚其父母諸兄之言亦庶幾哉鄭氏之說或未敢信與小序亦不合也蟋蟀晉僖公鄙陋局促故詩人賦此欲開廣其志意提策其精神以謀國其大義九月蟋蟀在堂附近於人寒氣將至而歲聿暮矣公當及時以禮自為虞樂否則日月舍我而去所謂樂者非甚沉湎當思所居之位所職之事長慮却顧以盡國君之道也詩人忠厚勸戒之意豈非堯之遺風乎故不繫之晉而繫之唐也羔裘羔裘刺時也晉昭公有曲沃之逼孤危將亡而其臣又不為保障之謀故國人憂之而作是詩意謂在位不能備禦曲沃但華衣服而美詞語爾居居究究集傳以為未詳按爾雅居居究究惡也蓋言在位者不肯恤民謀國爾葛生晉獻公好攻戰則國人多喪者婦人指其夫所死之地即詩人所謂塋域也言葛有所托蘝有所延我其誰與乎煢煢然無所依耳末云百歲之後歸于其室此婦人要其死期以相從見唐風之厚也有女同車有女同車刺鄭世子忽也忽嘗有功於齊齊侯請妻之忽不從輔氏曰鄭詩惟此篇為男悅女之辭意亦淫詩也按春秋傳鄭世子忽不取賢譽之齊女乃迎他國之女色雖美如舜華亦何益舍大國之援而卒見逐故詩人賦此以諷之兩言彼美孟姜德音莫忘此明指齊女而言蘀兮蘀兮刺鄭將亂也君子憂之呼諸大夫而告曰槁葉未辭柯以風吹而必落故謂槁葉為蘀也以比國難之時禍將及矣諸大夫其亟圖之倡豫和女圖之之意也風雨風雨思君子也當此風雨如晦之時雞鳴不已以喻世亂而君子不改其節如此之人我既見之豈不坦然而平夷哉二章三章皆一意也子襟子襟序言刺學校廢也鄭以國亂學校不修生徒解散賢者念朋㑹之無從使我心悠悠思之縱我不往子寧不繼聲以問我乎以見亂之甚矣采苓采苓刺晉獻公好諛聽讒也獻公殺恭世子逐群公子國人以采苓起興謂公曰人之言未可遽以為然且察其何所從來則情僞自知矣人君能如此察彼造言者無所遁其情而被讒者亦可以免禍矣權輿權輿刺康公忘先君之舊臣與賢者有始而無終也故賦此首章曰夏屋渠渠按正義夏大屋具渠渠勤勤言始則設食大具今則無餘猶下章始則四簋今則不飽皆說飲食之事不得言屋宅也且爾雅釋夏大屋具正訓又如此以故知謂禮物大具也若依舊說則下章與首逈異矣防有鵲巢防有鵲巢憂讒賊也陳宣公多信讒君子憂懼故作此詩謂讒言之惑非一日之致如防之有巢漸積而成卭之有苕蔓延牽附將及我也又引甓鷊義與此同皆憂讒之意也七月七月陳王業也周公采公劉后稷之詩以獻成王俾知小人之依以故稱夏正也若謂此詩周公所作也周之正朔典禮皆公所制豈肯身自犯之夫秉周禮以律周人周人猶或不信其可不用周禮哉東山東山言周公東征之歸也其二章云熠耀宵行毛云熠耀燐也燐螢火也古今注及埤雅爾雅翼皆因之陳思王論螢火夜飛非宵行耶集傳曰宵行蟲名或别有解也狼跋狼跋美周公也首章曰公孫碩膚赤舄几几公孫者豳公之孫謂周公也碩大膚美也赤舄履之盛者也老狼其進也如將躐其胡其退也如將跲其尾周公之輔成王值時多艱二叔流言於外成王猜疑於內如狼前憂躐其胡而後憂跲其尾也然周公居之從容自得而二患皆釋人徒見履赤舄几几安且閒也而不知其解患釋難之勞如此毛公以公孫為成王鄭以公孫為公遜皆非是常棣常棣燕兄弟也其首章曰鄂不韡韡鄭氏曰承華者曰鄂不當作拊拊鄂足也正義曰以鄂比于弟華比于兄鄂既承華又與拊連則鄂拊同比兄弟之相佐猶華鄂之相承覆也出車出車勞還率也舊說西伯受命於商王因命南仲為將往伐玁狁其成功而還也詩人歌其事以為勞還也自其出車至其執訊獲醜而歸備述之也或謂宣王命南仲非西伯也豫以為西伯出羑里即得專征伐理或有之歐陽說與詩緝相同書稱西伯戡黎詩又稱伐崇伐密皆有其事然伐玁狁或亦然也菁菁者莪菁菁者莪樂育材也君子能長育人才則天下喜樂之矣每觀小雅皆因其事而歌與國風所陳不同菁莪之詩當以為天子行禮於學宫則宴飲而歌此詩也庭燎庭燎美宣王也集傳不言所指考之列女傳宣王嘗晏起姜后脫簪珥待罪永巷宣王感悟於是勤於政事早朝晏退卒成中興之業以此證之當為宣王詩無疑也鶴鳴鶴鳴毛云誨宣王也集傳以為不可知其由然必陳善納誨之辭考之諸家所說以為求賢人之未仕者詩曰鶴鳴九皋聲聞于野言身雖隱而名則著也此篇自秦漢以來說者多異毛鄭在衆說之先皆謂興求賢必有師承當從之黃鳥黃鳥序言刺宣王也集傳不詳某時所作東萊吕氏曰宣王之末民有失所者意他國之可居也及其至彼則又不若故鄉焉故思而欲歸如此按詩義不言所刺之事亦不及宣王一語意或幽厲之時室家離散者則有之宣王內修政事外攘夷狄故能恢復境土安集人民則民之失所者必少小序吕氏俱謂宣王不足信矣白駒及我行其野其義皆同此正月正月大夫刺幽王也末云民今之無祿天夭是㭬楊氏曰張衡應間云利端始萠害漸亦牙速速方穀夭夭亦加欲豐其屋乃蔀其家據此天夭為夭夭也衡去古不逺宜得其真且佌佌速速夭夭連文為是不應速速下又特出天夭也夭夭之義自然天夭之說勉强王介甫詩栩栩幽人夢夭夭老者居亦祖張說十月之交十月之交毛氏以為大夫刺幽王也鄭氏曰刺厲王蓋以此篇有畨維司徒及鄭桓公友皆厲王時人故曰厲王詩㮮嘗考之鄭桓公友在幽王時畨維司徒先後用事又曰豔妻煽方處艷妻者褒姒也以此三事言之當從毛說與下二章小旻小宛大略相同皆以為幽王詩可也雨無正雨無正大夫刺幽王也雨自上而下也衆多如雨非所以為政也㮮嘗讀韓詩有雨無正所刺皆同比毛詩篇首多雨無其極傷我稼穯八字補傳云詩之命名皆摘取詩中之語獨雨無正巷伯常武酌賚般六篇特出詩人之意非有序以發之雖孔子亦不能知其為何詩也韓詩篇首多二句是詩前二章皆十句而加以二句意或章句之多少不計也據今序求詩人之言亦可見令下如雨之多非所以為政之意也戎成不退饑成不遂戎成詩大義已見雨無正矣此二句謂兵戎之禍已成而其勢不退言外患之熾也饑困之災已成而其生不遂言內憂之迫也此庶與上下文頗順啓明長庚啓明長庚詩大義己見大東矣啓明長庚毛氏曰一星也後世因之遂以長庚為太白故李白母夢長庚名白字太白鄭漁仲曰啓明金星長庚水星金在日西故日將出則東見水在日東故日將沒則西見實二星也毛氏之說誤無將大車無將大車大夫悔進小人也言君子推挽小人小人既進則讒害君子如人推挽大車大車既進則塵汚於人故君子悔之小人進而害君子則可憂多端不必更思是我自取其病悔無及矣鼓鐘鼓鐘序言刺幽王也集傳以為此詩義未詳不敢質其事永叔曰按此篇則是作樂於淮上矣然旁考詩書史記皆無幽王東巡之事書曰徐夷並興蓋自成王時徐夷及淮夷已皆不為周臣宣王時嘗遣將伐之亦不自往初無幽王東巡之事然不得作樂於淮上矣嚴氏謂古事亦有不見於史而因經以見者其說亦通頍辨有頍者辨宴樂兄弟之詩也安成劉氏曰此章諸本皆作賦而又有兼興兼比今詳首章六句曰辨曰酒曰殽曰兄弟皆述宴時之實事其體屬賦而六句之中實維伊何與伊異人詩意相應又似興體七句八句則又似比故曰當為賦兼興比也㮮按此章分析頗明但詩只稱六義若如此詩義不止於六也凡此似興似比當據其首章重者要者而言不應二三其說也車牽車牽大夫刺幽王也傳以為燕樂新昏之詩也按婚禮不賀人之序也又曰娶婦之家三日不舉樂思嗣親也新婚安得有燕也小序云幽王無道周人思得賢女以配君子此義近之非宴樂新婚之作也棫朴棫朴序言文王能官人也鄭氏謂預斫棫朴將祭而用蓋牽於奉璋之說也倬彼雲漢而下鄭說更無官人之意其曰壽考作人者言文王能養育賢才各任其職王但享壽考邈然在上無所動作而國自治也官人之意何在哉思齊思齊序言文王所以聖也古注云非但天性而德有所由成蓋言文王所以聖者由母太任賢也夫思齊之義主述大任之德能致文王之聖爾今詩自惠於宗公而下四章皆了不及大任何也或曰首章錯簡耳詩本言周世有賢婦文王幼育於賢母長得賢配之助以成其德其德由內及外由近及逺不以幽隱而廢不以厭倦而怠不聞亦入不諫亦式也言性與天合蓋如此詩人既述文王修身之善又述所遇事皆中理然後本其所以聖者由生於賢母幼被養育而成也據詩義解若此然首章終似錯簡耳靈臺靈臺為文王作也經度營表庶民樂於趣事所以不日成之不日古注云不設期日也今注不終日也㮮按不設期日既見文王之仁亦於事理為協若曰不終日豈有一日而成一臺者哉鼉鼓鼉鼓陸機曰鼉似蜥蜴皮堅厚可以冒鼓韻㑹云鼉宵鳴如桴鼓今江淮間謂鼉鳴為鼉鼓其數應更故吳越謂之鼉更未見有以皮冒鼓者樂書曰詩人託之其鳴應更為靈德之應非實鼓也如簫音似鳯故謂之鳯簫即此類下武惟周下武美武王也集傳曰下義未詳周氏曰凡物扶植之則上偃仆之則下下武者即書所謂偃武也言周雖以武定天下然伐商之後偃其武馬散之華山之陽牛放之桃林之野車甲釁而藏之府庫倒載干戈包以虎皮天下皆知武王之不復用兵也故曰下武惟周生民生民誦后稷也其三章云誕實匍匐克岐克嶷毛傳曰岐知也嶷識也謂后稷早有知慧而匍匐之時即能就口食藝麻麥也曹氏以為岐嶷能立之狀若然既言匍匐又言能立似相背戾毛傳近之使知慧不早則與常人何異非所以誦后稷也既醉既醉序言成王祭畢而燕群臣也其三章曰昭明有融高朗令終舊說以令終為考終命此非臣子祝君之辭也一章二章方祝君以萬年不應三章遽祝以考終命其言不倫夫人靡不有初鮮克有終始明終昏者多矣故又祝其高明而善終也過而後改迷而後復不若有始有卒之盡善也此庶幾得之維玉及瑶何以舟之維玉及瑶䩛琫容刀集傳以為帶此劔佩以上下山原吕氏以為以如是之佩服而親如是之勤苦所以為厚於民意尚未明若欲勤民何用佩服於此佩服何以見其勤民蓋此章接上章遷居而言始遷之時公劉相土居民汲汲雖劍佩在身不暇解釋即勤於事以見其厚民之切也卷阿卷阿召康公戒成王也成王將蒞政召康公作此以獻其意在求賢用吉士也其言鳯凰于飛亦集爰止鄭氏以為因時鳯至故以為喻㮮嘗考之詩書諸史成王時未嘗有鳯至也且鳯希有之鳥以興王能致難得之臣也以此知不指鳯為實有之物明矣鄭之不可信類此嵩高嵩高尹吉甫美宣王也天下復平能建國親諸侯褒賞申伯焉凡八章初讀之皆贈申伯之辭及再玩所言王室依賴諸侯表式皆天下安危大計是詩之義也王氏曰此詩本贈申伯而以為美宣王則王之美於是乎在唐史臣褒裴度云非度破賊之難也任度之為難也申伯信賢矣任申伯者豈不賢乎往近王舅往近王舅詩其義已見嵩高毛氏曰近已也鄭氏曰近辭也辭者語助辭也朱子集傳用鄭說今之解者不一楊氏曰詩云彼其之子禮記彼記之子或又作忌如叔善射忌之例然則記也其也忌也皆語助辭也㮮曰已矣二字古通用如毛說似又簡明常武常武序言宣王親征淮北之夷召穆公作是詩以美之傳曰詩中無常武二字召穆公特以此名篇蓋有二義有常德以立武則可以武為常則不可此所以有美有戒也又見解頥新語云召穆公之意謂德可為常武不可黷故先極言其用兵之盛以滿其志卒章乃陳警戒之言故其言易入也後之為辭賦者或竊取其義如作曲終奏雅勸百諷一之類是也維昔維昔詩大義己見召旻其五章曰維昔之富不如時維今之疚不如兹首二倒字句也昔時之善人是富今兹之君子在疚也兹年也古人謂兹為年取草木繁茂之義也吕氏春秋今兹美禾來兹美麥文選為樂須及時誰能待來兹維昔之富不如時言君子之得志也維今之疚不如兹言君子之失志也君子疚則小人肆故曰彼疏斯稗以比君子小人疏粗米也彼小人何為不廢退以避君子乃職主援引之黨乎池竭召旻刺幽王也其六章曰池之竭矣不云自瀕泉之竭矣不云自中集傳以此詩作賦體余心竊疑及見大全或問此章疑是比體如何朱子曰作比為是又見語録答潘時舉問亦同但集傳未及改也清廟維天祀文王也洛誥稱惟周公誕保文武受命惟七年則是成洛邑而作此詩也又稱新邑蒸祭歲文王騂牛一武王騂牛一按蒸祭文武而此樂歌祇頌文王之德者何也蓋父子並祭統於尊故不及武王也假以溢我假溢詩大義已見清廟矣春秋傳曰假為何溢為恤余初讀未安及觀詩緝假大而盈溢於我常有以收之使不失墜惟在大順文王之德而已其者自期之辭收謂保其業惠謂體其德大惠則無斯須毫釐之違戾也此說亦通且經文不改也是用大介周頌祭武王之詩時純熙矣是用大介鄭氏訓介為助大介所謂得道者多助也或訓介為甲似不如鄭為切也烈文辟公烈文成王即政諸侯助祭之作也錫福毛氏以為文王錫之鄭氏以為天錫之今注以為諸侯錫成王以祉福而惠我以無彊使我子孫保之也此諸說不同要之毛鄭於事情稍近不失天子戒諸侯之體洪範云天子斂福以錫民未聞諸侯反錫天子以福也振鷺振鷺為助祭諸侯作也武王克商封舜之後於陳禹之後於把湯之後於宋謂之三恪書所稱作賔王室是也周承殷微子且賢故來助祭兩見於詩殷尚白服色因之不改其一曰振鷺于飛亦有斯容其一曰有客有客亦白其馬皆為微子而言序謂二王之後不言主名又非三恪之義此序之誤也夙夜基命宥密夙夜祀成王也楊氏曰毛氏云宥寬仁也密安靜也孔穎達云寬仁所以止苛刻安靜所以息暴亂豈不明白正大而得帝王之體乎今人解宥為宏深密為靜密以字義言之宥者寬宥也未聞宥為宏深也宏深靜密既於基命不切又不知宏深靜密為何事聖人治天下之大經大法易曉易見不如是之隱癖也閔余小子閔余小子嗣王朝于廟也末云烏乎皇王繼序思不忘皇王集傳兼指文武也鄭氏謂武王也嚴氏錢氏解亦同鄭說余嘗疑之及得仲木經說辨論可謂詳矣亦以三氏之言為是泮水泮水頌僖公能修泮宫也戴埴曰泮宫漢儒以名學嘗觀泮水序止曰頌僖公能修泮宫而詩言無小無大從公于邁則征伐之事順彼長道屈此群醜則克敵之功既克淮夷不吳不揚則淮夷之服借曰受成於學獻馘獻囚可也其曰濟濟多士克廣德心似矣而繼以桓桓于征狄彼東南不過從邁之多賢載色載笑匪怒伊教似矣而先以其馬蹻蹻其音昭昭不過宴飲之和樂合序與詩皆無育才之說也按通典泮乃魯水名僖公建宫於上因水以名宫如楚渚宫之類是也余觀戴氏之辨數百言且有根據豫不能盡録姑舉此以明泮非因學而設也閟宫閟宫序言頌僖公能復周公之宇也其二章居岐之陽實始翦商此史臣追叙之辭非太王真有翦商之志矣或曰此詩作於僖公既卒之後觀四五章俾爾昌而熾俾爾壽而富皆祝僖公昌大而壽考也若謂僖公既卒之詩似難解矣𤣥鳥𤣥鳥祀高宗也詩緯曰契母有娀氏浴於𤣥丘之水睇𤣥鳥銜卵而墜契母得而吞之遂生契自此說一出太史公因之以彰大其事豫切疑之夫卵不出蓐燕不徙巢其口且隘何得云銜即使銜之而誤墜未必不碎也蓋解詩者不得其說而取緯說以明之考之月令𤣥鳥至以太牢祀高禖以祈子意者契母以𤣥鳥至之月祈子有應詩人因其事而頌之曰天命𤣥鳥降而生商降者尊之神之貴之若曰實自天來也此說庶幾得詩人之意也五經稽疑卷三
