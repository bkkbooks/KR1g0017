body:
  text: 五經稽疑卷四明朱睦㮮撰春秋隱公春王正月自漢以來解經者皆謂周正建子至宋諸儒始有謂以夏時冠周月者有謂時月皆仍夏舊者各持所見紛紜不一愚按春秋桓八年十月雨雪定元年十月殞霜殺菽夫雪與霜降于十月節氣之常必周之八月而後知不當有而有也桓十四年春正月無氷成元年二月無氷以見時暄而寒令失職矣若夏之正月東風解凍自當無氷又何為異况二月乎諸説雖有異同然以經文考之當的然知為周正無疑也公及邾儀父盟于蔑儀父邾之命卿也左氏公羊俱以為邾子克之字及考春秋諸侯未有書字者何獨于邾而字耶其曰邾儀父者如魯季孫行父晉荀林父之類是也鄭伯克假于鄢諸傳専責莊公失教其説固是按春秋之法責上常輕責下常重以此防民猶有臣弒其君子弒其父者蓋長幼之分尊卑之義不明也分義明而天下無叛逆篡弒之禍矣公子益師卒益師卒不日三傳妄解武夷胡氏辨之詳矣獨謂恩數之有厚薄不能無疑焉竊嘗考內大夫卒者自成公以後皆書日成公以前間有遺者蓋厯年逺而簡編脫故也其卒不日者皆類此沙鹿齊氏曰魯之世卿凡九家合三十八人其書卒者未有不日者也有不日者此年公子益師及後無駭卒挾卒數人而已傳例曰公不與小斂故不書日此固不足深信然直指為脫簡尤屬臆説之至存以質疑可也紀子帛莒子盟于密左氏作紀子帛以為裂繻字也考之通經無大夫先諸侯之例者其説難通公羊以為當云紀子某伯莒子盟于密胡氏因之然紀本非子爵則公羊之説似亦末當子上疑有闕文夫人子氏薨子氏隱之妻公羊以為隱之母按左傳聲子仲子均非正嫡安得僣夫人之號春秋之初王制猶存未至文公以後僣稱失禮之甚也武氏子來求􅉠諸傳皆為平王崩武氏子為王來求賻也獨孫明復以為武氏子父死未葬故來求賻若謂王求賻則在周卿大夫豈無可使者乃使一未爵之子乎當以孫説為是戊申衛州吁弒其君完説凡例者謂稱名自絶于先君故削其屬籍稱公子者見其以天屬之親而反為冦讐夫事同而書異何也春秋之初命氏者向少故州吁無知督萬不書其族春秋之中大夫僣國無有不氏者故商人歸生里克趙盾徴舒崔杼寧喜陳乞楚比皆以大夫書氏書名矣稱人微者稱國衆而不可名者也春秋據事直書其罪自見名爵稱謂之間何有輕重哉翬帥師會宋公陳侯蔡人衛人伐鄭翬帥師伐鄭本一事也傳岐而為二其義重翬之罪以為非公命而專兵也雖然不書使罪自見矣今必斷章而義似反晦也此與莊八年齊無知弒其君諸兒傳同滕侯卒左傳曰不書名未同盟也凡諸侯同盟則稱名按春秋此年書滕侯卒宣九年成十六年書滕子卒皆不名至昭以後凡四書滕子卒皆名此近者詳而逺者闕也史文之脫可知非謂同盟與未同盟也城中丘此年公將伐邾城中丘左氏曰書不時也按春秋城內邑二十有三以夏城者七以春城者四其餘皆時也不時而城固書時而城亦書何邪聖人惜民力慎興作懲僣慝爾其因邾因莒而城與大夫自強而城各因文以見義不在書時與不時也三月癸酉大雨震電庚辰大雨雪春秋以日書者如癸酉大雨震電庚辰大雨雪則有以見八日之間而再經天變也又如壬申御廩災乙亥嘗則有以見其嘗于災餘為不敬若此類蓋于書日見之非以日之書不書寓褒貶也齊人鄭人入郕今年齊鄭入郕莊八年郕降于齊以此觀之齊欲并郕故帥鄭人而入左氏謂討違王命于經無所考亦不敢據也桓公春王正月公即位公羊傳曰繼弒君不言即位此其言即位何如其意也按春秋國君終嗣子繼正則行即位之禮文成襄哀是也繼故則子弟不忍行即位之禮莊閔僖是也桓宣非繼正也而行即位之禮者何蓋桓弒隱宣弒赤皆以弟篡兄而有國不義之甚畏人議已故假此禮欲自同於遭喪繼正者以欺天下後世耳大抵行即位禮則書即位不行即位禮則不書聖人據史舊文無所加損如其意之説恐亦未至滕子來朝胡氏曰桓負篡弒大惡先鄰國而朝之與夷狄無異故降而稱子苟如其言罪及一身足矣終春秋之世不復稱侯豈以祖有罪而并貶其子孫乎且當時滅典禮叛君父者多矣何皆不貶而獨及一小國邪程沙隨又曰小國事大國其朝聘貢賦之多寡視其爵之崇卑滕故自貶稱子及觀隱公初滕薛爭長位次且不肯讓矧自貶其爵乎或以為當喪未君前又不見滕侯卒皆窒礙難通也按樂正子記滕侯薛侯旅朝隱公桓王聞之徴朝滕以子往薛以伯往王怒皆黜焉此與杜氏范氏之説俱同其為王所黜審矣當是時周德雖衰命令猶存如二邾皆自附庸升而為子傳以為數從齊桓攘楚桓請于天子命為諸侯以此觀之則時王黜陟之令未可謂廢盡也杞侯來朝左氏曰杞侯來朝不敬杞侯歸乃謀伐之公榖皆謂杞為紀以齊欲滅紀紀求魯為援非為桓立而朝也按春秋杞侯自是年朝桓之後繼有入杞之役會郕之平比事而觀知其為杞必矣左氏非誤也若紀自齊鄭偽朝之後始有戒心與杞無預至其朝桓之失即文自見亦何待貶爵以著之乎春正月四明程氏曰桓公正月無王者十有四或謂王不頒厯或謂桓無王或謂元年書王以正桓之罪二年書王以正宋督之罪十年書王以數之終十八年書王以正桓之終也其説然乎曰聖人據舊史作春秋以見當時之事其經國大義昭如日星豈屑屑去一字以示貶使後世揣摩臆度起紛紛之論哉必其傳寫之誤而後世不敢增耳今必欲就闕文生義則桓十四年書夏五而無月昭十年不書冬桓四年七年不書秋僖二十八年不書冬有日而無月將何以為義乎夫桓之篡弒固無王矣宣公事迹與桓無異何以復書王邪桓既無王元年即不書王可也今元年書王以為正桓之罪三年不書王反不正桓邪元年猶可言也二年書王為正宋督之罪然翬弒隱慶父弒閔楚啇臣弒父凡此類何以皆不書王于前去王於後以正之邪若曰十年數之終十八年正桓之終則尤難通者也為此説者由於不解王正月三字相屬而以王字自為一義正月自為一義故也苟知春秋據事直書不以一字為褒貶義在於事而不在於年月日時之間則自然無此病矣齊侯衛侯胥命于蒲公羊傳曰胥命者何相命也何言乎相命近正也古者不盟結言而退當是時諸侯會遇不盟者多矣豈皆近正邪如近正則齊衛之君必有殊異之行及考二國始末並非賢君據經文只譏其僣也僣者何春秋非王者不稱命書齊衛胥命于蒲者罪二國之僣王也有年有年者三傳以為祥賈逵胡氏以為異何也古者國有災祥君告廟史然後書以有年告者桓宣之意也二公得國不正蓋欲假天道以厭服人心也春秋不革者正以著二公僣逆夸詐之罪爾甲戌巳丑陳侯鮑卒左氏曰再赴也於是陳亂按春秋戍字下疑有陳他殺其君之子免八字脫之矣不然明年蔡人殺他事無由起也甲戌巳丑相接當是傳寫之誤天王使仍叔之子來聘杜氏曰仍叔天子之大夫稱子本于父字幼弱之辭此蓋譏子弟預國政耳或謂責世官若然何不曰仍氏之子乎如仍氏之子已為大夫經自當以官氏名字見若咺渠伯紏之類是也今曰仍叔之子蓋知為未命之稱也杜説得之矣冬州公如曺六年春正月實來州公來魯必經曺衛之間故先書如曺而繼書實來文相承也齊氏曰往外曰遂內來曰實皆兼事之辭或以實為名恐誤丁卯子同生胡氏曰冡嫡始生即書于䇿與子之法也此義固精然文公成公皆嫡也何又不書榖梁子曰疑故志之考之經文桓公三年文薑歸魯至十八年始與桓公如齊其間十五年文薑在魯未嘗適齊而子同生于桓公六年則同非齊侯之子明矣榖梁之説與齊詩展我甥兮之義合蓋必有所據也焚咸丘桓立七年邾不修朝聘之禮故焚其邑杜氏曰焚火田也火田而在今十二月固其時也何用乎書明年秋伐邾益信榖伯綏來朝鄧侯吾離來朝豐氏曰按石經二朝字俱作奔字蓋榖伯鄧侯見逼于楚而如魯自是不復能歸其國矣公榖皆曰榖伯鄧侯何以名失地也其為來奔而非來朝明矣然則傳本之訛不在二子之世而在晉泰始之間乎宋人執鄭祭仲突歸于鄭鄭忽出奔衛鄭突宋出也宋欲立突執祭仲仲從其請突遂立而世子忽奔衛公羊以為合于反經之權後世蓋有廢置其君如奕棋然未必不由公羊啓之也反經之説不亦謬乎丙戌公會鄭伯盟于武父丙戌衛侯晉卒豐氏曰按石經衛侯晉卒四字在盟于武父之前衛上無丙戌二字榖梁傳錯簡于此許叔入于許左傳載鄭伯使許叔居許東偏以奉許祀今鄭亂而始入也按經隱十一年止書公及齊鄭入許許未嘗滅也許未嘗滅則必有君許者矣設使許叔果奉許祀則今日之事乃光復舊物必異其文以書不得與突入鄭小白入齊同一法也蔡季自陳歸于蔡何氏謂封人無子季次當立封人欲立獻舞而疾季季避之陳封人卒季歸奔喪無怨心故賢而字之按經凡書自某國者皆求援而歸也求援而歸是不命于先君不請于天子謂之禮得乎春秋紀事為戒而已矣其於名字無擇也如王使榮叔來錫桓公命此寵篡逆也而書榮叔柔會宋公陳侯蔡叔盟于折此以臣敵君為不信之盟也而書蔡叔豈皆賢而字之邪何氏之説似不足據葬蔡桓侯啖氏曰春秋諸侯多私諡且稱公而蔡獨請諡于天子故以本爵加之及考春秋諸侯葬者悉稱公不應此獨異蓋公者虛位禮之文也諸侯在國臣子皆以是稱尊君之辭也至於魯頌乃季孫行父請命于周而作者其詩曰周公之孫莊公之子雖逹于天子告于宗廟亦取尊名稱之不以僣為嫌也請諡之説三傳不載惟啖氏倡為此議蓋本于桓侯傳寫之誤莊公夫人孫于齊左氏曰不稱薑氏絶不為親禮也如其説自此凡八書夫人薑氏何也蓋再見故不言姓氏耳若夫人孫齊求其義自見不在去姓氏以示貶也單伯逆王姬左傳曰單伯送王姬杜氏曰單伯天子之卿也單采地伯爵也王將嫁女于齊使單伯送且命魯主之諸傳不然皆以單伯為魯卿也改送為逆按春秋凡謂娶者曰逆嫁者曰歸今言逆是魯娶王姬矣可乎以左氏杜氏之説考之與經義俱合單伯其為王卿明矣王使榮叔來錫桓公命諸傳皆謂桓公弒逆之人生不能討死又褒錫故特去天而書王也此恐未然不書天者脫之高陵吕氏曰寵篡逆之罪即錫命之文巳具矣如曰去天以見義是為子而可改易父之名字諡號也紀侯大去其國紀侯何以不書出奔出奔者身雖奔而國猶在或為人所滅而出奔非我自棄其國也紀侯不然聞三國遇于垂則以為謀巳也遂棄其國而逃故特書曰去其國深罪紀侯之不能守社稷也如榖梁言民之從者不遺一人四年而後畢則紀當復興如太王之去邠也然自此之後紀無聞焉不知所從之民何以止乎此就大去二字生義也然不解大本紀侯之名苟以大去為盡去則伯姬不葬叔姬歸酅不可通矣秋大水無麥苗左綿趙氏曰説者以麥苖為二物麥且未艾安得獨有苖此蓋疑五月之際麥將實不可曰苖也不知未登場圃安得舉其實二十八年冬書大無麥禾則榖既登場圃矣故明舉其實此則苖未實為水所漂爾及齊師戰于乾時我師敗績何氏謂內不言敗此其言敗者為與讐戰雖敗亦榮也按此年莊公以納紏未克故與齊戰於乾時為讐定國非復讐也其戰何名其敗何榮正以見戰之非義以取辱也公敗齊師于長勺齊桓既立報其納紏之役戰于長勺魯幸而捷故書公敗齊師于長勺而傳者以未陳為敗詐也夫魯敗某師多矣無有書戰者豈皆未陳而敗乎此以納紏致冦亦自足責奚用詐謀為貶乎齊師滅談談子奔莒范氏曰談子國滅不名蓋無罪也按春秋諸侯失地被獲皆名比於賤者責其不能守社稷也然有不名者或逺方小國名字不通或通史失之不然談子失地與蔡侯獻舞何殊其可賤一也齊侯宋人陳人蔡人邾人會于北杏四明張氏曰説者以為與齊之能安中夏故書爵惡四國無王故書人夫法家擬罪必分首從若賞其首而誅其從則其誤甚矣四國書人皆微者也非貶辭公會齊侯盟于柯柯之盟不日傳曰信之也蔑之盟不日則曰渝之也桓之盟不日則曰危之也比而觀之三盟俱不日將以信之為是乎渝之為是乎危之為是乎此蓋世逺史闕聖人安得僕僕問而增之乎然其事之美刺係乎其文實不在書日與不日也單伯會伐宋齊桓北杏之約尊王也宋人不遵齊桓請于王王遣單伯伐之非兵力之不足也桓之意欲以假王命懾諸侯之不一者公榖諸儒因元年逆王姬之誤遂以單伯為魯大夫失春秋會伐之旨矣公子結媵陳人之婦于鄄遂及齊侯宋公盟公子結媵婦遂盟公羊曰大夫受命不受辭出境有可以安社稷利國家則專之可也後之人有生事異域而以公羊之言為據者按春秋書遂盟者罪公子結也結不可遂盟則公羊之説誤矣秋七月戊戌夫人薑氏薨薑氏之惡極矣始終以夫人之禮書之孰謂春秋奪人之爵以為貶也亦據事直書而美惡自見耳夏五月何休曰譏莊公娶讐女不可奉先祖四時祭祀猶五月不宜首時此説太鑿未有以五月為首時者下文有脫事爾或曰四訛為五也及齊高傒盟于防莊公慕大國之盛而欲締婚故與高傒盟于防也非親盟故書及説者謂不書公諱與大夫盟也按公與大夫盟者未嘗不書如公及莒人盟于浮來之類是也何獨於此為諱乎此蓋譏仇讐喪娶爾祭叔來聘凡王臣來聘于魯皆書使此年祭叔來聘不書使非王命也非王命則祭叔私交于外當書曰來如隱元年祭伯來之類也春秋書來不稱聘稱聘則又非私也祭叔上疑有脫誤荆人來聘前伐鄭書荆今聘書人或者不考其文因以為進之也若直書荆來聘則似舉國皆來於文不順而大夫之名氏又未通于中國也故加人不然僖十八年荆人狄人伐衛亦書人者豈皆進之邪丹桓宫楹何氏曰丹楹者為將娶齊女欲夸大示之果爾則羣廟當盡飾豈特一禰廟哉此蓋文薑將祔廟而飾桓宫楹也新延廄按左氏解新為新作過也公羊解新為修舊不及也何則凡室宇創建曰新作因舊而葺之曰修舊新延廄非創也去其舊而一新爾郭公趙氏曰公榖皆云赤者蓋郭公也按郭公自是闕文赤者曺公子也文義都不相關傳者之誤又有云郭亡亦臆度之辭齊人伐山戎燕周同姓之國雖不修職貢非山戎所得伐也桓公方受方伯之命而可以無討乎是故救燕伐戎而命燕君納貢於周者連帥責也傳譏桓公勤兵逺夷過矣齊侯來獻戎捷陸氏曰當為齊人文誤按上文伐戎則人安得獻捷則侯乎城小榖小榖魯城也經以魯自城為文左氏曰城小榖為管仲也蓋左氏因見昭十一年申無宇稱齊桓公城榖而置管仲焉遂誤以城小榖為城榖也以經文考之榖自是齊城小榖自是魯城城小榖非為齊城也公子牙卒傳謂牙黨慶父而季友以君命鴆之為季友諱殺同姓故書卒也按經內殺大夫書刺不書刺而言卒則非殺明矣閔公季子來歸朱子曰季子來歸如高子來盟齊仲孫來之類當時魯國內亂則國人皆有慰望之意故魯史喜而書之夫子直書舊史之辭其實季子無狀觀於成風之事可見一書季子來歸而季氏得政權去公室之漸皆由此起矣按諸傳俱賢季子有相魯之功固也及來歸之後不能防武闈之難不能討慶父之惡忍視故君不為喪葬汲汲惟在謀立僖公以終成風之託可謂賢乎不賢乎紫陽之論深得春秋誅絶之義夏五月乙酉吉禘于莊公禘之説二有郊禘之禘有禘祫之禘大傳曰不王不禘王者禘其祖之所自出以其祖配之此所謂郊禘之禘也又禮稱三年一祫五年一禘禘者審第昭穆之序當三年或五年天子諸侯取毁廟之主設壇墠而祭之此所謂禘祫之禘也若天子禘不祫諸侯祫不禘是天子諸侯各廢一祭矣安得有三年五年之辨哉天子諸侯當免喪遇祫則祫遇禘則禘今莊公之薨方二十五月閔公即行吉禘之禮此失之太早不謂當禘不當禘也五經稽疑卷四
